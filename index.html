<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Christmas Tree with Gemini</title>
    <!-- MediaPipe 依赖库 -->
    <script src="js/mediapipe_camera_utils.js" crossorigin="anonymous"></script>
    <script src="js/mediapipe_control_utils.js" crossorigin="anonymous"></script>
    <script src="js/mediapipe_drawing_utils.js" crossorigin="anonymous"></script>
    <script src="js/mediapipe_hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050810;
            font-family: 'Courier New', Courier, monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI 界面层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-text {
            position: absolute;
            top: 20px;
            left: 0;
            color: rgba(255, 230, 100, 0.9);
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
            font-size: 13px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-left: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 0 10px 10px 0;
            backdrop-filter: blur(4px);
            pointer-events: auto;
            cursor: pointer;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .hud-text.expanded {
            transform: translateX(0);
            z-index: 16;
        }

        .hud-toggle {
            position: absolute;
            top: 20px;
            left: 5px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 215, 0, 0.9);
            font-size: 16px;
            pointer-events: auto;
            z-index: 15;
            backdrop-filter: blur(4px);
            transition: transform 0.3s ease;
            will-change: transform;
        }

        .hud-toggle.slide-right {
            transform: translateX(240px);
            pointer-events: none;
        }

        .hud-text h3 {
            margin-top: 0;
            font-size: 16px;
            color: #fff;
        }

        .hud-text p {
            margin: 5px 0;
        }

        #fps-counter {
            position: absolute;
            top: 10px;
            right: 5px;
            color: rgba(0, 255, 255, 0.8);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.4);
            font-size: 11px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 8px;
            border-radius: 3px;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        /* Gemini 魔法祝福按钮区域 */
        #magic-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            text-align: right;
        }

        #blessing-btn {
            background: linear-gradient(135deg, #1a5e32, #0f3b1e);
            border: 1px solid rgba(100, 255, 100, 0.6);
            color: #aaddaa;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 30px;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(26, 94, 50, 0.6);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #blessing-btn:hover {
            transform: scale(1.05);
            background: #2f9e4f;
            color: #fff;
            box-shadow: 0 0 30px rgba(47, 158, 79, 0.8);
        }

        /* 祝福语显示层 */
        #blessing-overlay {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 20;
        }

        #blessing-content {
            font-size: 24px;
            line-height: 1.6;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 100, 50, 0.6);
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(5px);
            font-family: "Georgia", serif;
        }



        #upload-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            pointer-events: auto;
        }

        #upload-btn {
            background: linear-gradient(135deg, #b30000, #800000);
            border: 1px solid rgba(255, 215, 0, 0.6);
            color: #ffd700;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 8px;
            font-size: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        #upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 50, 50, 0.5);
            background: #cc0000;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050810;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-size: 18px;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #333;
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 进度条样式 */
        #progress-container {
            width: 80%;
            max-width: 600px;
            margin-top: 30px;
        }

        #main-progress-wrapper { margin-bottom: 20px; }

        #main-progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ffd700;
        }

        #main-progress-bar {
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        #main-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #050810;
        }

        #sub-progress-list { max-height: 200px; overflow-y: auto; }

        .sub-progress-item {
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .sub-progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .sub-progress-name {
            color: #aaddaa;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sub-progress-stats {
            color: #88aaff;
            font-size: 11px;
            margin-left: 10px;
        }

        .sub-progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .sub-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.2s ease;
        }

        #input_video {
            display: none;
        }

        #debug-cam {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 90px;
            background: #000;
            border: 1px solid #333;
            opacity: 0.8;
            z-index: 5;
            transform: scaleX(-1);
            border-radius: 5px;
        }

        /* ================= 移动端适配 ================= */
        @media screen and (max-width: 768px) {
            /* UI 层基础调整 */
            #ui-layer {
                padding: 10px;
            }

            /* HUD 手势指南面板 - 移动端优化 */
            .hud-text {
                top: 10px;
                left: 10px;
                font-size: 11px;
                padding: 10px;
                max-width: 180px;
            }

            .hud-toggle.slide-right {
                transform: translateX(200px);
            }

            .hud-text h3 {
                font-size: 13px;
                margin-bottom: 5px;
            }

            .hud-text p {
                margin: 3px 0;
                line-height: 1.4;
            }


            /* 上传按钮 - 移动端右下角 */
            #upload-container {
                bottom: 15px;
                right: 15px;
            }

            #upload-btn {
                padding: 10px 16px;
                font-size: 11px;
            }

            /* 调试摄像头预览 - 移动端缩小 */
            #debug-cam {
                bottom: 10px;
                left: 10px;
                width: 80px;
                height: 60px;
            }

            /* 祝福内容 - 移动端适配 */
            #blessing-overlay {
                top: 25%;
                width: 90%;
            }

            #blessing-content {
                font-size: 16px;
                padding: 20px;
                line-height: 1.5;
            }

            /* 进度条容器 - 移动端 */
            #progress-container {
                width: 90%;
                max-width: 400px;
                margin-top: 20px;
            }

            #main-progress-label {
                font-size: 12px;
            }

            #main-progress-bar {
                height: 20px;
            }

            #main-progress-fill {
                font-size: 11px;
            }

            #sub-progress-list {
                max-height: 150px;
            }

            .sub-progress-item {
                padding: 8px;
                margin-bottom: 10px;
            }

            .sub-progress-header {
                font-size: 10px;
            }

            .sub-progress-stats {
                font-size: 9px;
            }

            .sub-progress-bar {
                height: 6px;
            }

            /* 加载界面 - 移动端 */
            #loader {
                font-size: 14px;
            }

            .spinner {
                width: 30px;
                height: 30px;
                margin-bottom: 15px;
            }

            /* 祝福按钮 - 移动端 */
            #blessing-btn {
                padding: 10px 18px;
                font-size: 12px;
            }
        }

        /* 超小屏幕适配（iPhone SE 等） */
        @media screen and (max-width: 375px) {
            .hud-text {
                font-size: 10px;
                padding: 8px;
                max-width: 150px;
            }

            .hud-text h3 {
                font-size: 11px;
            }

#upload-btn {
                padding: 8px 12px;
                font-size: 10px;
            }

            #debug-cam {
                width: 60px;
                height: 45px;
            }

            #blessing-content {
                font-size: 14px;
                padding: 15px;
            }

            #progress-container {
                width: 95%;
            }
        }

        /* 横屏模式适配 */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .hud-text {
                max-width: 160px;
                font-size: 10px;
                padding: 8px;
            }

            .hud-text h3 {
                font-size: 11px;
            }

            #debug-cam {
                width: 70px;
                height: 52px;
            }

            #upload-container {
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ================= 加载进度跟踪 =================
        const FILE_SIZES = {
            'hand_landmark_full.tflite': 5.5,
            'hands_solution_packed_assets.data': 4.3,
            'hands_solution_simd_wasm_bin.wasm': 6,
            'default': 1
        };

        const progressTracker = {
            files: {},
            totalBytes: 0,
            loadedBytes: 0,
            startTime: Date.now(),

            addFile(filename, sizeMB) {
                this.files[filename] = {
                    size: sizeMB * 1024 * 1024,
                    loaded: 0,
                    startTime: null,
                    speed: 0,
                    eta: 0
                };
                this.totalBytes += sizeMB * 1024 * 1024;
            },

            updateProgress(filename, loaded) {
                const file = this.files[filename];
                if (!file) return;

                if (!file.startTime) {
                    file.startTime = Date.now();
                }

                const elapsed = (Date.now() - file.startTime) / 1000;
                const prevLoaded = file.loaded;
                file.loaded = loaded;

                if (elapsed > 0) {
                    file.speed = loaded / elapsed / 1024; // KB/s
                    const remaining = file.size - loaded;
                    file.eta = file.speed > 0 ? remaining / 1024 / file.speed : 0;
                }

                this.loadedBytes = Object.values(this.files).reduce((sum, f) => sum + f.loaded, 0);
                this.updateUI();
            },

            completeFile(filename) {
                const file = this.files[filename];
                if (file) {
                    file.loaded = file.size;
                    this.loadedBytes = Object.values(this.files).reduce((sum, f) => sum + f.loaded, 0);
                    this.updateUI();
                }
            },

            updateUI() {
                const percent = this.totalBytes > 0 ? (this.loadedBytes / this.totalBytes * 100) : 0;
                const mainFill = document.getElementById('main-progress-fill');
                const mainPercent = document.getElementById('main-progress-percent');

                if (mainFill) mainFill.style.width = percent + '%';
                if (mainPercent) mainPercent.textContent = percent.toFixed(1) + '%';

                // 更新子进度条
                const subList = document.getElementById('sub-progress-list');
                if (subList) {
                    subList.innerHTML = '';
                    Object.entries(this.files).forEach(([filename, file]) => {
                        const filePercent = file.size > 0 ? (file.loaded / file.size * 100) : 0;
                        const speedText = file.speed > 0 ? `${file.speed.toFixed(1)} KB/s` : '计算中...';
                        const etaText = file.eta > 0 ? `${file.eta.toFixed(1)}s` : '--';

                        const item = document.createElement('div');
                        item.className = 'sub-progress-item';
                        item.innerHTML = `
                            <div class="sub-progress-header">
                                <span class="sub-progress-name">${filename}</span>
                                <span class="sub-progress-stats">${speedText} | ${etaText}</span>
                            </div>
                            <div class="sub-progress-bar">
                                <div class="sub-progress-fill" style="width: ${filePercent}%"></div>
                            </div>
                        `;
                        subList.appendChild(item);
                    });
                }
            }
        };

        // 初始化已知文件
        Object.entries(FILE_SIZES).forEach(([name, size]) => {
            if (name !== 'default') {
                progressTracker.addFile(name, size);
            }
        });

        // 移动端检测（全局复用，必须在 CONFIG 之前）
        const _isMobile = /Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // ================= 配置参数 =================
        const CONFIG = {
            colors: {
                bg: 0x050810,
                green: 0x2f9e4f,
                gold: 0xffd700,
                red: 0xff3333,
                white: 0xffffff,
                heart: 0xff3366
            },
            particleCount: 2000,
            photoCount: 40,
            treeHeight: 65,
            treeRadius: 28,
            // 【核心修改】将心形大小从45调整为30，确保不超过屏幕
            heartSize: 4
        };
        const STATE = {
            mode: 'TREE',
            handDetected: false,
            handPosition: { x: 0, y: 0 },
            pinchDistance: 1,
            activePhotoIndex: 0,
            lastModeTime: 0,
            rotVelX: 0.001,
            rotVelY: 0,
            // 【优化】心形模式默认距离调整为120（更近，适合较小的心形）
            cameraRadius: 200,
            targetCameraRadius: 200,
            heartProgress: 0 // 心形转换进度 (0-1)
        };
        // ================= 1. Three.js 场景初始化 =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.colors.bg);
        scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.012);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        // 初始位置
        camera.position.set(0, 30, 200); // 与 targetCameraRadius 一致
        camera.up.set(0, 1, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.9;
        container.appendChild(renderer.domElement);
        const renderScene = new RenderPass(scene, camera);
        // Bloom：桌面端半分辨率，移动端1/3分辨率
        const bloomDiv = _isMobile ? 3 : 2;
        const bloomResolution = new THREE.Vector2(
            Math.floor(window.innerWidth / bloomDiv),
            Math.floor(window.innerHeight / bloomDiv)
        );
        const bloomPass = new UnrealBloomPass(bloomResolution, 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.3;
        bloomPass.strength = _isMobile ? 0.8 : 1.2;
        bloomPass.radius = 0.5;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        // === 灯光系统 ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(CONFIG.colors.gold, 8.0, 500);
        pointLight.position.set(20, 40, 40);
        scene.add(pointLight);
        const frontLight = new THREE.DirectionalLight(0xffeebb, 3.5);
        frontLight.position.set(0, 20, 100);
        scene.add(frontLight);
        const rimLight = new THREE.DirectionalLight(0x4455ff, 5.0);
        rimLight.position.set(40, 50, -40);
        scene.add(rimLight);
        // ================= 2. 材质与几何体构建 =================
        const matGreen = new THREE.MeshStandardMaterial({
            color: CONFIG.colors.green,
            roughness: 0.3, metalness: 0.2,
            emissive: 0x0f4a22,
            emissiveIntensity: 0.8,
            emissiveMap: createNoiseTexture(32, 32) // 添加噪声贴图
        });
        const matGold = new THREE.MeshStandardMaterial({
            color: 0xffcc00,
            roughness: 0.1, metalness: 0.8,
            emissive: 0xffaa00,
            emissiveIntensity: 1.0,
            emissiveMap: createNoiseTexture(64, 64) // 金色使用更高分辨率
        });
        const matRed = new THREE.MeshStandardMaterial({
            color: CONFIG.colors.red,
            roughness: 0.2, metalness: 0.3,
            emissive: 0x4a0f0f,
            emissiveIntensity: 0.8,
            emissiveMap: createNoiseTexture(32, 32) // 添加噪声贴图
        });
        // 【新增】心形材质
        const matHeart = new THREE.MeshStandardMaterial({
            color: CONFIG.colors.heart,
            roughness: 0.1, metalness: 0.5,
            emissive: 0xff6699,
            emissiveIntensity: 0.7,
            emissiveMap: createNoiseTexture(32, 32)
        });
        // 在材质定义之后添加这个函数
        function createNoiseTexture(width, height) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                // 创建噪点图案
                const r = Math.random() * 255;
                const g = Math.random() * 255;
                const b = Math.random() * 255;
                data[i] = r;     // R
                data[i + 1] = g; // G
                data[i + 2] = b; // B
                data[i + 3] = 150; // A (透明度)
            }

            const treePos = getTreeSurfacePosition(hNorm, angle, 1.2);

        const fileInput = document.getElementById('file-input');

        // ================= 4. MediaPipe 手势识别 =================
        const videoElement = document.getElementById('input_video');

        function onResults(results) {
            const loader = document.getElementById('loader');
            if (loader.style.display !== 'none') {
                loader.style.opacity = 0;
                setTimeout(() => loader.style.display = 'none', 800);
            }
            debugCtx.save();
            debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
            debugCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                STATE.handDetected = true;
                const landmarks = results.multiHandLandmarks[0];
                if (window.drawConnectors && window.HAND_CONNECTIONS) {
                    window.drawConnectors(debugCtx, landmarks, window.HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });
                }
                const palmX = landmarks[9].x;
                const palmY = landmarks[9].y;
                STATE.handPosition.x = (palmX - 0.5) * 3.0;
                STATE.handPosition.y = (palmY - 0.5) * 3.0;
                // 【核心】手势测距变焦：映射手部大小 (0.05-0.25) 到摄像机距离 (140-200)
                const wrist = landmarks[0];
                const middleMCP = landmarks[9];
                const handSize = Math.hypot(middleMCP.x - wrist.x, middleMCP.y - wrist.y);
                const minHand = 0.05;
                const maxHand = 0.25;
                // 【修改】缩小后的变焦范围 140-200
                const minRad = 140;
                const maxRad = 200;
                let t = (handSize - minHand) / (maxHand - minHand);
                t = Math.max(0, Math.min(1, t));
                // 手越近(t->1)，距离越近(minRad)
                STATE.targetCameraRadius = (1 - t) * (maxRad - minRad) + minRad;
                // 手势识别函数
                const isFingerExtended = (tipIdx, pipIdx) => {
                    const dTip = Math.hypot(landmarks[tipIdx].x - landmarks[0].x, landmarks[tipIdx].y - landmarks[0].y);
                    const dPip = Math.hypot(landmarks[pipIdx].x - landmarks[0].x, landmarks[pipIdx].y - landmarks[0].y);
                    return dTip > dPip * 1.1;
                };
                // 检测各个手指是否伸直
                const indexExt = isFingerExtended(8, 6);   // 食指
                const middleExt = isFingerExtended(12, 10); // 中指
                const ringExt = isFingerExtended(16, 14);   // 无名指
                const pinkyExt = isFingerExtended(20, 18);  // 小指
                // V字手势：食指和中指伸直，其他手指弯曲
                const vGesture = indexExt && middleExt && !ringExt && !pinkyExt;
                const extendedCount = [indexExt, middleExt, ringExt, pinkyExt].filter(Boolean).length;
                const pinchDist = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y);
                STATE.pinchDistance = pinchDist;
                const now = Date.now();
                // 【修改】V字手势检测 - 心形模式下使用更近的摄像机距离
                if (vGesture && STATE.mode !== 'HEART' && (now - STATE.lastModeTime > 1000)) {
                    STATE.mode = 'HEART';
                    STATE.lastModeTime = now;
                    // 【优化】心形模式使用更近的摄像机距离
                    STATE.targetCameraRadius = 120;
                }
                // 其他手势检测
                else if (pinchDist < 0.05 && extendedCount >= 1 && STATE.mode !== 'INSPECT' && (now - STATE.lastModeTime > 1000)) {
                    STATE.mode = 'INSPECT';
                    STATE.lastModeTime = now;
                    const photoObjs = objects.filter(o => o.userData.isPhoto);
                    let closestPhoto = null;
                    let minDist = Infinity;
                    photoObjs.forEach(obj => {
                        if (obj.position.dot(camera.position) > 0) {
                            _ndcPos.copy(obj.position).project(camera);
                            const dist = Math.hypot(_ndcPos.x, _ndcPos.y);
                            if (dist < minDist) {
                                minDist = dist;
                                closestPhoto = obj;
                            }
                        }
                    });
                    if (closestPhoto) {
                        STATE.activePhotoIndex = closestPhoto.userData.id;
                    }
                } else if (extendedCount >= 4 && STATE.mode !== 'SCATTER' && pinchDist > 0.1) {
                    STATE.mode = 'SCATTER';
                } else if (extendedCount === 0 && STATE.mode !== 'TREE' && pinchDist > 0.1) {
                    STATE.mode = 'TREE';
                    // 退出心形模式时重置照片状态
                    if (STATE.mode === 'TREE') {
                        objects.forEach(obj => {
                            if (obj.userData.isPhoto && obj.userData.isHeartPhoto) {
                                obj.userData.isHeartPhoto = false;
                                obj.scale.copy(obj.userData.baseScale || new THREE.Vector3(1, 1, 1));
                            }
                        });
                    }
                }
            } else {
                STATE.handDetected = false;
                // 【核心】无手势时，自动退回到最远距离
                STATE.targetCameraRadius = 200;
            }
            debugCtx.restore();

        if (window.Hands) {

            const isMobile = /Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5, useCpuInference: isMobile });
            hands.onResults(onResults);

            // 拦截 MediaPipe 文件加载
            const originalFetch = window.fetch;
            window.fetch = async function(...args) {
                const url = args[0];
                const filename = url.split('/').pop();

                // 检查是否是已知的模型文件
                if (FILE_SIZES[filename]) {
                    const response = await originalFetch.apply(this, args);
                    const contentLength = response.headers.get('content-length');
                    const total = contentLength ? parseInt(contentLength) : FILE_SIZES[filename] * 1024 * 1024;

                    const reader = response.body.getReader();
                    let loaded = 0;

                    const stream = new ReadableStream({
                        async start(controller) {
                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                loaded += value.length;
                                progressTracker.updateProgress(filename, loaded);
                                controller.enqueue(value);
                            }
                            controller.close();
                            progressTracker.completeFile(filename);
                        }
                    });

                    return new Response(stream, {
                        headers: response.headers,
                        status: response.status,
                        statusText: response.statusText
                    });
                }

                return originalFetch.apply(this, args);
            };

            // 拦截 XMLHttpRequest 以捕获 .data 文件
            const originalXHROpen = XMLHttpRequest.prototype.open;
            const originalXHRSend = XMLHttpRequest.prototype.send;

            XMLHttpRequest.prototype.open = function(method, url, ...rest) {
                this._trackedUrl = url;
                this._trackedFilename = url.split('/').pop();
                return originalXHROpen.apply(this, [method, url, ...rest]);
            };

            XMLHttpRequest.prototype.send = function(body) {
                const xhr = this;
                const filename = xhr._trackedFilename;

                if (FILE_SIZES[filename]) {
                    // 添加进度监听
                    xhr.addEventListener('progress', (e) => {
                        if (e.lengthComputable) {
                            progressTracker.updateProgress(filename, e.loaded);
                        }
                    });

                    xhr.addEventListener('load', () => {
                        progressTracker.completeFile(filename);
                    });
                }

                return originalXHRSend.apply(this, [body]);
            };

            if (window.Camera) {
                const cameraUtils = new window.Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 320, height: 240 });
                cameraUtils.start();
            }
        } else { document.getElementById('loader').innerText = "错误: 无法加载 AI 模型"; }
        // ================= 星空粒子系统 =================
        function createStarField() {
            // --- 第一层：远景密集小星 (静态闪烁) ---
            const starCount = _isMobile ? 4000 : 8000;
            const sizeMultiplier = _isMobile ? 1.3 : 1.0;
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);
            const starPhases = new Float32Array(starCount); // 闪烁相位
            const colorPalette = [
                new THREE.Color(0xffffff), // 白色
                new THREE.Color(0xaaccff), // 蓝白
                new THREE.Color(0xffeedd), // 暖白
                new THREE.Color(0xffd700), // 金色 (少量)
                new THREE.Color(0xff9999), // 淡红 (少量)
                new THREE.Color(0xccddff), // 冰蓝
            ];
            const colorWeights = [0.45, 0.2, 0.2, 0.06, 0.04, 0.05]; // 权重
            function weightedRandomColor() {
                let r = Math.random();
                let cumulative = 0;
                for (let i = 0; i < colorWeights.length; i++) {
                    cumulative += colorWeights[i];
                    if (r < cumulative) return colorPalette[i];
                }
                return colorPalette[0];
            }
            for (let i = 0; i < starCount; i++) {
                // 分布在 150~450 半径的球壳上
                const radius = 150 + Math.random() * 300;
                const phi = Math.acos(-1 + 2 * Math.random());
                const theta = Math.random() * Math.PI * 2;
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);
                const col = weightedRandomColor();
                starColors[i * 3] = col.r;
                starColors[i * 3 + 1] = col.g;
                starColors[i * 3 + 2] = col.b;
                // 大小：大多数很小，偶尔有几颗亮的
                const sizeRand = Math.random();
                if (sizeRand < 0.85) {
                    starSizes[i] = (0.3 + Math.random() * 2.6) * sizeMultiplier;  // 小星
                } else if (sizeRand < 0.97) {
                    starSizes[i] = (0.8 + Math.random() * 4.2) * sizeMultiplier;  // 中星
                } else {
                    starSizes[i] = (1.8 + Math.random() * 8.0) * sizeMultiplier;  // 大亮星
                }
                starPhases[i] = Math.random() * Math.PI * 2;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
            starGeometry.setAttribute('phase', new THREE.BufferAttribute(starPhases, 1));
            // 自定义 Shader 实现闪烁
            const starMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uPixelRatio: { value: renderer.getPixelRatio() }
                },
                vertexShader: `
attribute float size;
attribute float phase;
varying vec3 vColor;
varying float vBrightness;
uniform float uTime;
uniform float uPixelRatio;
void main() {
vColor = color;
// 闪烁：每颗星有不同的频率和相位
float twinkleSpeed = 0.5 + phase * 0.8;
float twinkle = 0.6 + 0.4 * sin(uTime * twinkleSpeed + phase * 6.2831);
vBrightness = twinkle;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
gl_PointSize = size * uPixelRatio * twinkle * (200.0 / -mvPosition.z);
gl_PointSize = max(gl_PointSize, 0.5);
gl_Position = projectionMatrix * mvPosition;
}
`,
                fragmentShader: `
varying vec3 vColor;
varying float vBrightness;
void main() {
// 圆形光晕粒子
vec2 center = gl_PointCoord - vec2(0.5);
float dist = length(center);
if (dist > 0.5) discard;
// 柔和的星芒效果：中心亮 + 外围光晕
float core = smoothstep(0.5, 0.0, dist);
float glow = smoothstep(0.5, 0.1, dist) * 0.6;
float alpha = (core + glow) * vBrightness;
// 亮星加十字星芒
vec2 absCenter = abs(center);
float cross = smoothstep(0.02, 0.0, min(absCenter.x, absCenter.y)) * 0.3;
alpha += cross * vBrightness;
gl_FragColor = vec4(vColor * (0.8 + vBrightness * 0.5), alpha);
}
`,
                transparent: true,
                vertexColors: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });

            const dustPhases = new Float32Array(dustCount);
            const dustVelocities = [];
            for (let i = 0; i < dustCount; i++) {
                dustPositions[i * 3] = (Math.random() - 0.5) * 250;
                dustPositions[i * 3 + 1] = (Math.random() - 0.5) * 250;

            const dustMaterial = new THREE.ShaderMaterial({

attribute float size;
attribute float phase;
varying float vAlpha;
uniform float uTime;
uniform float uPixelRatio;
void main() {
float pulse = 0.3 + 0.7 * sin(uTime * 0.3 + phase * 6.2831);
vAlpha = pulse * 0.15;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
gl_PointSize = size * uPixelRatio * pulse * (100.0 / -mvPosition.z);
gl_PointSize = max(gl_PointSize, 0.3);
gl_Position = projectionMatrix * mvPosition;
}
`,
                fragmentShader: `

void main() {
vec2 center = gl_PointCoord - vec2(0.5);
float dist = length(center);
if (dist > 0.5) discard;
float alpha = smoothstep(0.5, 0.0, dist) * vAlpha;
gl_FragColor = vec4(0.6, 0.7, 1.0, alpha);
}
`,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });
            const dustField = new THREE.Points(dustGeometry, dustMaterial);
            scene.add(dustField);
            // --- 第三层：银河带 (密集的弧形星带) - 移动端跳过 ---
            let milkyWay = null;
            let milkyWayMaterial = null;
            if (!_isMobile) {

`,

            milkyWay = new THREE.Points(milkyWayGeometry, milkyWayMaterial);

                    starField.rotation.y = time * 0.005;
                    starField.rotation.x = Math.sin(time * 0.003) * 0.02;
                    // 银河带缓慢旋转
                    if (milkyWay) milkyWay.rotation.y = time * 0.008;
                    // 微尘漂移
                    const positions = dustGeometry.attributes.position.array;
                    for (let i = 0; i < dustCount; i++) {
                        positions[i * 3] += dustVelocities[i].x;
                        positions[i * 3 + 1] += dustVelocities[i].y;
                        positions[i * 3 + 2] += dustVelocities[i].z;
                        // 边界循环
                        const bound = 125;
                        if (Math.abs(positions[i * 3]) > bound) positions[i * 3] *= -0.9;
                        if (Math.abs(positions[i * 3 + 1]) > bound) positions[i * 3 + 1] *= -0.9;
                        if (Math.abs(positions[i * 3 + 2]) > bound) positions[i * 3 + 2] *= -0.9;
                    }
                    dustGeometry.attributes.position.needsUpdate = true;
                }
            };
        }
        const starSystem = createStarField();
        // ================= 5. 动画循环 =================
        function lerp(start, end, alpha) { return start * (1 - alpha) + end * alpha; }
        // 预分配 updatePhysics 临时变量
        const _camForward = new THREE.Vector3();
        const _forward = new THREE.Vector3();
        const _tempUp = new THREE.Vector3();
        const _right = new THREE.Vector3();
        const _up = new THREE.Vector3();
        const _qYaw = new THREE.Quaternion();
        const _qPitch = new THREE.Quaternion();
        const _qFinal = new THREE.Quaternion();
        const _treeCamPos = new THREE.Vector3(0, 30, 160);
        const _targetUp = new THREE.Vector3(0, 1, 0);
        function updatePhysics(time) {
            _camForward.set(0, 0, -1).applyQuaternion(camera.quaternion);
            // 控制实体树干和树叶的显示与旋转
            if (treeGroup) {
                const isTreeMode = STATE.mode === 'TREE';
                treeGroup.visible = isTreeMode;
                if (isTreeMode) {
                    treeGroup.rotation.y = time * 0.4;
                }
            }
            // 更新粒子树枝
            if (branchSystem) {
                const isTreeMode = STATE.mode === 'TREE';
                branchSystem.mesh.visible = isTreeMode;
                if (isTreeMode) {
                    const treeRotation = time * 0.4;
                    const cosR = Math.cos(treeRotation);
                    const sinR = Math.sin(treeRotation);
                    for (let i = 0; i < branchSystem.data.length; i++) {
                        const b = branchSystem.data[i];
                        const bx = b.basePos.x * cosR - b.basePos.z * sinR;
                        const bz = b.basePos.x * sinR + b.basePos.z * cosR;
                        const sway = Math.sin(time * 1.5 + b.phase) * 0.12;
                        _tempObj.position.set(bx + sway, b.basePos.y, bz + sway * 0.5);
                        _tempObj.rotation.set(
                            b.rot.x + Math.sin(time * 0.8 + b.phase) * 0.04,
                            b.rot.y + treeRotation,
                            b.rot.z
                        );
                        _tempObj.scale.setScalar(b.scale);
                        _tempObj.updateMatrix();
                        branchSystem.mesh.setMatrixAt(i, _tempObj.matrix);
                    }
                    branchSystem.mesh.instanceMatrix.needsUpdate = true;
                }
            }
            // 【动态灯光控制】
            let targetLightY_Point, targetLightY_Rim, targetLightY_Front;
            let targetIntensity_Point, targetIntensity_Front, targetIntensity_Ambient;
            if (STATE.mode === 'TREE') {
                // 基础位置
                targetLightY_Point = 0;
                targetLightY_Rim = 20;
                targetLightY_Front = 5;
                // 闪烁效果：让灯光强度周期性变化
                const flashSpeed = 3.0; // 闪烁速度
                const flashIntensity = 0.3; // 闪烁强度
                // 主灯光闪烁
                const pointFlash = 1.0 + Math.sin(time * flashSpeed + 0.0) * flashIntensity;
                targetIntensity_Point = 8.0 * pointFlash;
                // 前灯光闪烁（不同相位）
                const frontFlash = 5.0 + Math.sin(time * flashSpeed + 2.1) * flashIntensity * 0.7;
                targetIntensity_Front = 3.5 * frontFlash;
                // 环境光闪烁（更平缓）
                const ambientFlash = 5.0 + Math.sin(time * flashSpeed * 0.5 + 1.3) * flashIntensity * 0.5;
                targetIntensity_Ambient = 2.5 * ambientFlash;
            } else if (STATE.mode === 'INSPECT') {
                // 拾取照片：升高灯光，亮度降低至 40% (8.0 -> 3.2, 3.5 -> 1.4, 2.5 -> 1.0)
                targetLightY_Point = 100;
                targetLightY_Rim = 100;
                targetLightY_Front = 60;
                targetIntensity_Point = 3.2;  // 8.0 * 0.4
                targetIntensity_Front = 1.4;  // 3.5 * 0.4
                targetIntensity_Ambient = 1.0; // 2.5 * 0.4
            } else if (STATE.mode === 'HEART') {
                // 心形模式：灯光集中在心形中心
                targetLightY_Point = 30;
                targetLightY_Rim = 40;
                targetLightY_Front = 20;
                // 心形脉动灯光效果
                const heartPulse = 0.5 + 0.5 * Math.sin(time * 2.0);
                targetIntensity_Point = 10.0 * heartPulse;
                targetIntensity_Front = 4.0 * heartPulse;
                targetIntensity_Ambient = 3.0 * heartPulse;
            } else {
                // SCATTER
                targetLightY_Point = 40;
                targetLightY_Rim = 50;
                targetLightY_Front = 20;
                targetIntensity_Point = 8.0;
                targetIntensity_Front = 3.5;
                targetIntensity_Ambient = 2.5;
            }
            pointLight.position.y = lerp(pointLight.position.y, targetLightY_Point, 0.04);
            rimLight.position.y = lerp(rimLight.position.y, targetLightY_Rim, 0.04);
            frontLight.position.y = lerp(frontLight.position.y, targetLightY_Front, 0.04);
            pointLight.intensity = lerp(pointLight.intensity, targetIntensity_Point, 0.05);
            frontLight.intensity = lerp(frontLight.intensity, targetIntensity_Front, 0.05);
            ambientLight.intensity = lerp(ambientLight.intensity, targetIntensity_Ambient, 0.05);
            // 【新增】心形转换进度
            if (STATE.mode === 'HEART') {
                STATE.heartProgress = lerp(STATE.heartProgress, 1.0, 0.03);
            } else {
                STATE.heartProgress = lerp(STATE.heartProgress, 0.0, 0.03);
            }
            // === 更新照片和星星（仅40+1个对象，draw call极少） ===
            objects.forEach(obj => {
                const isStar = obj.userData.isStar;
                _targetPos.set(0, 0, 0);
                let targetScaleMult = 1.0;
                if (STATE.mode === 'HEART') {
                    if (obj.userData.isPhoto) {
                        const gridCols = 4;
                        const photoIndex = obj.userData.id;
                        const row = Math.floor(photoIndex / gridCols);
                        const col = photoIndex % gridCols;
                        const gridSize = CONFIG.heartSize * 30;
                        const x = (col - (gridCols - 1) / 2) * (gridSize / (gridCols - 0.3));
                        const z = (row - 2) * (gridSize / 3);
                        const heartWidth = CONFIG.heartSize * 1.2;
                        const heartHeight = CONFIG.heartSize * 1.5;
                        if (Math.abs(x) < heartWidth * 0.8 && z > -heartHeight * 0.4 && z < heartHeight * 0.4) {
                            _targetPos.set(x, z * 0.5, -CONFIG.heartSize * 0.3 + z * 0.2);
                            targetScaleMult = 1.8;
                            obj.userData.isHeartPhoto = true;
                        } else {
                            _targetPos.copy(obj.userData.scatterPos);
                            targetScaleMult = 1;
                            obj.userData.isHeartPhoto = false;
                        }
                        dummy.quaternion.copy(camera.quaternion);
                        dummy.rotateY(Math.PI);
                        obj.userData.targetQuaternion.copy(dummy.quaternion);
                    } else if (isStar) {
                        _targetPos.copy(obj.userData.scatterPos);
                    }
                } else if (STATE.mode === 'TREE') {
                    _targetPos.copy(obj.userData.treePos);
                    _targetPos.y += Math.sin(time * 1.5 + obj.userData.phase) * 0.1;
                    const treeRotation = time * 0.4;
                    const x = _targetPos.x * Math.cos(treeRotation) - _targetPos.z * Math.sin(treeRotation);
                    const z = _targetPos.x * Math.sin(treeRotation) + _targetPos.z * Math.cos(treeRotation);
                    _targetPos.x = x;
                    _targetPos.z = z;
                } else if (STATE.mode === 'SCATTER') {
                    _targetPos.copy(obj.userData.scatterPos);
                    _ndcPos.copy(_targetPos).project(camera);
                    const distToCenter = Math.hypot(_ndcPos.x, _ndcPos.y);
                    if (_ndcPos.z < 1 && distToCenter < 0.8) {
                        const pullStrength = Math.pow(1 - distToCenter, 2) * 25;
                        _pullDir.copy(camera.position).sub(_targetPos).normalize();
                        _targetPos.add(_pullDir.multiplyScalar(pullStrength));
                    }
                    _targetPos.y += Math.sin(time + obj.userData.phase) * 2;
                } else if (STATE.mode === 'INSPECT') {
                    if (obj.userData.id === STATE.activePhotoIndex && obj.userData.isPhoto) {
                        _targetPos.copy(camera.position).addScaledVector(_camForward, 40);
                        targetScaleMult = 3.0;
                    } else {
                        _targetPos.copy(obj.userData.scatterPos);
                        targetScaleMult = 1.0;
                    }
                }
                if (obj.userData.usingBasicMat &&
                    (STATE.mode !== 'INSPECT' || obj.userData.id !== STATE.activePhotoIndex)) {
                    if (obj.userData.originalMat) {
                        obj.material = obj.userData.originalMat;
                    }
                    obj.userData.usingBasicMat = false;
                }
                obj.position.lerp(_targetPos, 0.04);
                dummy.position.copy(obj.position);
                dummy.scale.set(1, 1, 1);
                if (STATE.mode === 'TREE') {
                    dummy.lookAt(0, obj.position.y, 0);
                    if (obj.geometry.type === 'ExtrudeGeometry') {
                        dummy.rotateY(time * 0.5);
                    }
                    obj.userData.targetQuaternion.copy(dummy.quaternion);
                } else if (STATE.mode === 'INSPECT' && obj.userData.id === STATE.activePhotoIndex && obj.userData.isPhoto) {
                    dummy.quaternion.copy(camera.quaternion);
                    dummy.rotateY(Math.PI);
                    obj.userData.targetQuaternion.copy(dummy.quaternion);
                } else if (STATE.mode === 'HEART' && obj.userData.isPhoto) {
                    // 心形中的照片面向相机（已在上方设置）
                } else {
                    _lookTarget.copy(obj.position).multiplyScalar(2);
                    dummy.lookAt(_lookTarget);
                    obj.userData.targetQuaternion.copy(dummy.quaternion);
                }
                obj.quaternion.slerp(obj.userData.targetQuaternion, 0.1);
                if (obj.userData.isPhoto && obj.userData.baseScale) {
                    _tempScale.copy(obj.userData.baseScale).multiplyScalar(targetScaleMult);
                    obj.scale.lerp(_tempScale, 0.1);
                } else if (!isStar) {
                    const s = lerp(obj.scale.x, targetScaleMult, 0.1);
                    obj.scale.set(s, s, s);
                }
            });

            // === 更新粒子 InstancedMesh（2000粒子仅3个draw call） ===
            const isHeartMode = STATE.mode === 'HEART';
            instancedGreen.material = isHeartMode ? matHeart : matGreen;
            instancedGold.material = isHeartMode ? matHeart : matGold;
            instancedRed.material = isHeartMode ? matHeart : matRed;
            for (let i = 0; i < particleData.length; i++) {
                const p = particleData[i];
                _targetPos.set(0, 0, 0);
                let targetScaleMult = 1.0;
                if (isHeartMode) {
                    _targetPos.copy(p.heartPos);
                    _targetPos.y += Math.sin(time * 2.0 + p.phase) * 2.0;
                    _targetPos.x *= 0.8 + Math.sin(time * 1.5 + p.phase * 0.5) * 0.1;
                    _targetPos.z = -CONFIG.heartSize * 0.5 + Math.sin(time * 1.3 + p.phase) * 3.0;
                } else if (STATE.mode === 'TREE') {
                    _targetPos.copy(p.treePos);
                    _targetPos.y += Math.sin(time * 1.5 + p.phase) * 0.1;
                    const treeRotation = time * 0.4;
                    const x = _targetPos.x * Math.cos(treeRotation) - _targetPos.z * Math.sin(treeRotation);
                    const z = _targetPos.x * Math.sin(treeRotation) + _targetPos.z * Math.cos(treeRotation);
                    _targetPos.x = x;
                    _targetPos.z = z;
                } else if (STATE.mode === 'SCATTER' || STATE.mode === 'INSPECT') {
                    _targetPos.copy(p.scatterPos);
                    if (STATE.mode === 'SCATTER') {
                        _ndcPos.copy(_targetPos).project(camera);
                        const distToCenter = Math.hypot(_ndcPos.x, _ndcPos.y);
                        if (_ndcPos.z < 1 && distToCenter < 0.8) {
                            const pullStrength = Math.pow(1 - distToCenter, 2) * 25;
                            _pullDir.copy(camera.position).sub(_targetPos).normalize();
                            _targetPos.add(_pullDir.multiplyScalar(pullStrength));
                        }
                    }
                    _targetPos.y += Math.sin(time + p.phase) * 2;
                }
                p.currentPos.lerp(_targetPos, 0.04);
                _tempObj.position.copy(p.currentPos);
                if (STATE.mode === 'TREE') {
                    _tempObj.lookAt(0, p.currentPos.y, 0);
                } else {
                    _lookTarget.copy(p.currentPos).multiplyScalar(2);
                    _tempObj.lookAt(_lookTarget);
                }
                p.targetQuaternion.copy(_tempObj.quaternion);
                p.currentQuat.slerp(p.targetQuaternion, 0.1);
                p.currentScale = lerp(p.currentScale, targetScaleMult, 0.1);
                _tempObj.quaternion.copy(p.currentQuat);
                _tempObj.scale.setScalar(p.currentScale);
                _tempObj.updateMatrix();
                if (p.type === 'green') instancedGreen.setMatrixAt(p.instanceIdx, _tempObj.matrix);
                else if (p.type === 'gold') instancedGold.setMatrixAt(p.instanceIdx, _tempObj.matrix);
                else instancedRed.setMatrixAt(p.instanceIdx, _tempObj.matrix);
            }
            instancedGreen.instanceMatrix.needsUpdate = true;
            instancedGold.instanceMatrix.needsUpdate = true;
            instancedRed.instanceMatrix.needsUpdate = true;
            // === 【轨迹球摄像机】 ===
            // 【核心】应用平滑变焦
            STATE.cameraRadius = lerp(STATE.cameraRadius, STATE.targetCameraRadius, 0.05);
            const radius = STATE.cameraRadius;
            if (STATE.mode === 'SCATTER' || STATE.mode === 'INSPECT' || STATE.mode === 'HEART') {
                let targetRotX = 0.001;
                let targetRotY = 0;
                if (STATE.handDetected) {
                    // 【反转手势】
                    targetRotX = -STATE.handPosition.x * 0.008; // 左右: 手左球右
                    // 【反转】垂直手势改为正向（手向上 -> rotY正 -> 球体向上转/相机向下移 -> 看底部）
                    targetRotY = STATE.handPosition.y * 0.008;
                }
                const friction = STATE.handDetected ? 0.1 : 0.02;
                STATE.rotVelX = lerp(STATE.rotVelX, targetRotX, friction);
                STATE.rotVelY = lerp(STATE.rotVelY, targetRotY, friction);
                _forward.copy(camera.position).normalize();
                _tempUp.copy(camera.up).normalize();
                _right.crossVectors(_tempUp, _forward).normalize();
                _up.crossVectors(_forward, _right).normalize();
                _qYaw.setFromAxisAngle(_up, -STATE.rotVelX);
                _qPitch.setFromAxisAngle(_right, -STATE.rotVelY);
                _qFinal.multiplyQuaternions(_qYaw, _qPitch);
                camera.position.applyQuaternion(_qFinal);
                camera.up.applyQuaternion(_qFinal);
                // 应用变焦后的位置
                camera.position.setLength(radius);
                camera.lookAt(0, 0, 0);
            } else {
                camera.position.lerp(_treeCamPos, 0.02);
                _tempUp.copy(camera.up);
                camera.up.lerp(_targetUp, 0.05);
                camera.lookAt(0, 10, 0);
                STATE.rotVelX = 0.001;
                STATE.rotVelY = 0;
                // 重置目标半径
                STATE.targetCameraRadius = 200;
            }
        }
        const clock = new THREE.Clock();
        const targetFPS = 120;
        const frameInterval = 1000 / targetFPS;
        let lastFrameTime = 0;
        let frameCount = 0;
        let lastFPSUpdateTime = 0;
        let fps = 0;
        const fpsCounter = document.getElementById('fps-counter');

        function animate(currentTime) {
            requestAnimationFrame(animate);

            const deltaTime = currentTime - lastFrameTime;

            if (deltaTime >= frameInterval) {
                lastFrameTime = currentTime - (deltaTime % frameInterval);
                frameCount++;

                const time = clock.getElapsedTime();
                updatePhysics(time);
                starSystem.update(time);
                treeLightsSystem.update(time); // 彩灯
                composer.render();

                // Update FPS display every 500ms
                if (currentTime - lastFPSUpdateTime >= 500) {
                    fps = Math.round(1000 / deltaTime);
                    lastFPSUpdateTime = currentTime;
                    fpsCounter.textContent = `FPS: ${fps}`;
                }
            }
        }
        animate(0);

        // HUD toggle functionality
        const hudToggle = document.getElementById('hud-toggle');
        const hudText = document.getElementById('hud-text');
        let hudExpanded = false;

        function toggleHUD() {
            hudExpanded = !hudExpanded;
            if (hudExpanded) {
                hudText.classList.add('expanded');
                hudToggle.classList.add('slide-right');
                hudToggle.textContent = '✕';
            } else {
                hudText.classList.remove('expanded');
                hudToggle.classList.remove('slide-right');
                hudToggle.textContent = '☰';
            }
        }

        hudToggle.addEventListener('click', toggleHUD);
        hudText.addEventListener('click', toggleHUD);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(Math.floor(window.innerWidth / bloomDiv), Math.floor(window.innerHeight / bloomDiv));
        });
    </script>
</body>

</html>
