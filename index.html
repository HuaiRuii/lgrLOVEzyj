        body {
            margin: 0;

        #canvas-container {

            pointer-events: none;
        }

        .hud-text h3 {

            color: #fff;
        }

        .hud-text p {
            margin: 5px 0;
        }

        /* Gemini 魔法祝福按钮区域 */

            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;

        #blessing-btn {
            background: linear-gradient(135deg, #1a5e32, #0f3b1e);
            border: 1px solid rgba(100, 255, 100, 0.6);

            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 30px;

        /* 祝福语显示层 */

            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);

        }

        #status-bar-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        #status-bar {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: rgba(20, 80, 40, 0.7);
            padding: 10px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #upload-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            pointer-events: auto;
        }

        #upload-btn {
            background: linear-gradient(135deg, #b30000, #800000);
            border: 1px solid rgba(255, 215, 0, 0.6);
            color: #ffd700;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 8px;
            font-size: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        #upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 50, 50, 0.5);
            background: #cc0000;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050810;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-size: 18px;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #333;
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 进度条样式 */
        #progress-container {
            width: 80%;
            max-width: 600px;
            margin-top: 30px;
        }

        #main-progress-wrapper { margin-bottom: 20px; }

        #main-progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ffd700;
        }

        #main-progress-bar {
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        #main-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #050810;
        }

        #sub-progress-list { max-height: 200px; overflow-y: auto; }

        .sub-progress-item {
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .sub-progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .sub-progress-name {
            color: #aaddaa;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sub-progress-stats {
            color: #88aaff;
            font-size: 11px;
            margin-left: 10px;
        }

        .sub-progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .sub-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.2s ease;
        }

        #input_video {
            display: none;

        #debug-cam {
            position: absolute;

            left: 20px;
            width: 120px;
            height: 90px;
            background: #000;
            border: 1px solid #333;
            opacity: 0.3;
            z-index: 5;
            transform: scaleX(-1);
            border-radius: 5px;
        }
    </style>
</head>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ================= 加载进度跟踪 =================
        const FILE_SIZES = {
            'hand_landmark_full.tflite': 5.5,
            'hands_solution_packed_assets.data': 4.3,
            'hands_solution_simd_wasm_bin.wasm': 6,
            'default': 1
        };

        const progressTracker = {
            files: {},
            totalBytes: 0,
            loadedBytes: 0,
            startTime: Date.now(),

            addFile(filename, sizeMB) {
                this.files[filename] = {
                    size: sizeMB * 1024 * 1024,
                    loaded: 0,
                    startTime: null,
                    speed: 0,
                    eta: 0
                };
                this.totalBytes += sizeMB * 1024 * 1024;
            },

            updateProgress(filename, loaded) {
                const file = this.files[filename];
                if (!file) return;

                if (!file.startTime) {
                    file.startTime = Date.now();
                }

                const elapsed = (Date.now() - file.startTime) / 1000;
                const prevLoaded = file.loaded;
                file.loaded = loaded;

                if (elapsed > 0) {
                    file.speed = loaded / elapsed / 1024; // KB/s
                    const remaining = file.size - loaded;
                    file.eta = file.speed > 0 ? remaining / 1024 / file.speed : 0;
                }

                this.loadedBytes = Object.values(this.files).reduce((sum, f) => sum + f.loaded, 0);
                this.updateUI();
            },

            completeFile(filename) {
                const file = this.files[filename];
                if (file) {
                    file.loaded = file.size;
                    this.loadedBytes = Object.values(this.files).reduce((sum, f) => sum + f.loaded, 0);
                    this.updateUI();
                }
            },

            updateUI() {
                const percent = this.totalBytes > 0 ? (this.loadedBytes / this.totalBytes * 100) : 0;
                const mainFill = document.getElementById('main-progress-fill');
                const mainPercent = document.getElementById('main-progress-percent');

                if (mainFill) mainFill.style.width = percent + '%';
                if (mainPercent) mainPercent.textContent = percent.toFixed(1) + '%';

                // 更新子进度条
                const subList = document.getElementById('sub-progress-list');
                if (subList) {
                    subList.innerHTML = '';
                    Object.entries(this.files).forEach(([filename, file]) => {
                        const filePercent = file.size > 0 ? (file.loaded / file.size * 100) : 0;
                        const speedText = file.speed > 0 ? `${file.speed.toFixed(1)} KB/s` : '计算中...';
                        const etaText = file.eta > 0 ? `${file.eta.toFixed(1)}s` : '--';

                        const item = document.createElement('div');
                        item.className = 'sub-progress-item';
                        item.innerHTML = `
                            <div class="sub-progress-header">
                                <span class="sub-progress-name">${filename}</span>
                                <span class="sub-progress-stats">${speedText} | ${etaText}</span>
                            </div>
                            <div class="sub-progress-bar">
                                <div class="sub-progress-fill" style="width: ${filePercent}%"></div>
                            </div>
                        `;
                        subList.appendChild(item);
                    });
                }
            }
        };

        // 初始化已知文件
        Object.entries(FILE_SIZES).forEach(([name, size]) => {
            if (name !== 'default') {
                progressTracker.addFile(name, size);
            }
        });

        // ================= 配置参数 =================
        const CONFIG = {
            colors: {
                bg: 0x050810,
                green: 0x2f9e4f,
                gold: 0xffd700,
                red: 0xff3333,
                white: 0xffffff,
                heart: 0xff3366
            },
            particleCount: 2000,
            photoCount: 40,
            treeHeight: 65,
            treeRadius: 28,
            // 【核心修改】将心形大小从45调整为30，确保不超过屏幕
            heartSize: 4
        };
        const STATE = {
            mode: 'TREE',
            handDetected: false,
            handPosition: { x: 0, y: 0 },
            pinchDistance: 1,
            activePhotoIndex: 0,
            lastModeTime: 0,
            rotVelX: 0.001,
            rotVelY: 0,
            // 【优化】心形模式默认距离调整为120（更近，适合较小的心形）
            cameraRadius: 200,
            targetCameraRadius: 200,
            heartProgress: 0 // 心形转换进度 (0-1)
        };
        // ================= 1. Three.js 场景初始化 =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.colors.bg);
        scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.012);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        // 初始位置
        camera.position.set(0, 30, 200); // 与 targetCameraRadius 一致
        camera.up.set(0, 1, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.9;
        container.appendChild(renderer.domElement);
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.3;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        // === 灯光系统 ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(CONFIG.colors.gold, 8.0, 500);
        pointLight.position.set(20, 40, 40);
        scene.add(pointLight);
        const frontLight = new THREE.DirectionalLight(0xffeebb, 3.5);
        frontLight.position.set(0, 20, 100);
        scene.add(frontLight);
        const rimLight = new THREE.DirectionalLight(0x4455ff, 5.0);
        rimLight.position.set(40, 50, -40);
        scene.add(rimLight);
        // ================= 2. 材质与几何体构建 =================
        const matGreen = new THREE.MeshStandardMaterial({
            color: CONFIG.colors.green,
            roughness: 0.3, metalness: 0.2,
            emissive: 0x0f4a22,
            emissiveIntensity: 0.8,
            emissiveMap: createNoiseTexture(32, 32) // 添加噪声贴图
        });
        const matGold = new THREE.MeshStandardMaterial({
            color: 0xffcc00,
            roughness: 0.1, metalness: 0.8,
            emissive: 0xffaa00,
            emissiveIntensity: 1.0,
            emissiveMap: createNoiseTexture(64, 64) // 金色使用更高分辨率
        });
        const matRed = new THREE.MeshStandardMaterial({
            color: CONFIG.colors.red,
            roughness: 0.2, metalness: 0.3,
            emissive: 0x4a0f0f,
            emissiveIntensity: 0.8,
            emissiveMap: createNoiseTexture(32, 32) // 添加噪声贴图
        });
        // 【新增】心形材质
        const matHeart = new THREE.MeshStandardMaterial({
            color: CONFIG.colors.heart,
            roughness: 0.1, metalness: 0.5,
            emissive: 0xff6699,
            emissiveIntensity: 0.7,
            emissiveMap: createNoiseTexture(32, 32)
        });
        // 在材质定义之后添加这个函数
        function createNoiseTexture(width, height) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                // 创建噪点图案
                const r = Math.random() * 255;
                const g = Math.random() * 255;
                const b = Math.random() * 255;
                data[i] = r;     // R
                data[i + 1] = g; // G
                data[i + 2] = b; // B
                data[i + 3] = 150; // A (透明度)
            }
            ctx.putImageData(imageData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(4, 4); // 重复贴图
            return texture;
        }
        // 【核心】照片材质：强制哑光 (Roughness 1.0)
        const matPhotoBase = new THREE.MeshStandardMaterial({
            side: THREE.DoubleSide,
            transparent: true,
            roughness: 1.0, // 哑光，不反光
            metalness: 0.0,
            color: 0xffffff
        });
        const objects = [];
        const dummy = new THREE.Object3D();
        const sphereGeo = new THREE.SphereGeometry(0.8, 24, 24);
        const boxGeo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
        // 【新增】心形几何体
        function createHeartShape(size = 1) {
            const curve = new THREE.Curve();
            curve.getPoint = function (t) {
                const angle = t * Math.PI * 2;
                const x = size * 16 * Math.pow(Math.sin(angle), 3);
                const y = size * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                return new THREE.Vector3(x, y, 0);
            };
            const points = curve.getPoints(100);
            const shape = new THREE.Shape(points);
            return shape;
        }
        function createStar() {
            const starShape = new THREE.Shape();
            const points = 5;
            const outerRadius = 3.5;
            const innerRadius = 1.8;
            for (let i = 0; i < points * 2; i++) {
                const angle = (i * Math.PI) / points;
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                if (i === 0) starShape.moveTo(x, y);
                else starShape.lineTo(x, y);
            }
            starShape.closePath();
            const extrudeSettings = { depth: 1.2, bevelEnabled: true, bevelThickness: 0.8, bevelSize: 0.5, bevelSegments: 12 };
            const starGeometry = new THREE.ExtrudeGeometry(starShape, extrudeSettings);
            starGeometry.rotateZ(Math.PI / 10);
            const starMat = new THREE.MeshStandardMaterial({
                color: 0xffd700, roughness: 0.1, metalness: 1.0, emissive: 0xffd700, emissiveIntensity: 0.9
            });
            const star = new THREE.Mesh(starGeometry, starMat);
            const topY = CONFIG.treeHeight / 2 + 2.5;
            star.userData = {
                treePos: new THREE.Vector3(0, topY, 0),
                scatterPos: new THREE.Vector3(0, 45, 0),
                targetQuaternion: new THREE.Quaternion(),
                velocity: new THREE.Vector3(),
                phase: 0
            };
            star.position.set(0, topY, 0);
            scene.add(star);
            objects.push(star);
            const starLight = new THREE.PointLight(0xffd700, 2.0, 40);
            starLight.position.set(0, topY, 0);
            scene.add(starLight);
        }
        createStar();
        function createPhotoTexture(img, index, isUserUpload = false) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const borderThickness = 20;
            let width, height;
            if (isUserUpload && img) {
                const maxDim = 1024;
                let scale = 1;
                if (img.width > maxDim || img.height > maxDim) scale = Math.min(maxDim / img.width, maxDim / img.height);
                const imgW = img.width * scale;
                const imgH = img.height * scale;
                width = imgW + borderThickness * 2;
                height = imgH + borderThickness * 2;
                canvas.width = width; canvas.height = height;
                const gradient = ctx.createLinearGradient(0, 0, width, height);
                gradient.addColorStop(0, "#ffd700"); gradient.addColorStop(0.5, "#ffeb3b"); gradient.addColorStop(1, "#fbc02d");
                ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);
                ctx.drawImage(img, borderThickness, borderThickness, imgW, imgH);
            } else {
                width = 400; height = 500;
                canvas.width = width; canvas.height = height;
                const gradient = ctx.createLinearGradient(0, 0, width, height);
                gradient.addColorStop(0, "#ffd700"); gradient.addColorStop(0.5, "#ffeb3b"); gradient.addColorStop(1, "#fbc02d");
                ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);
                const border = 20;
                const photoW = width - border * 2;
                const photoH = height - border * 2;
                const grd = ctx.createLinearGradient(border, border, border, border + photoH);
                grd.addColorStop(0, "#b30000"); grd.addColorStop(1, "#800000");
                ctx.fillStyle = grd; ctx.fillRect(border, border, photoW, photoH);
                ctx.fillStyle = '#ffd700'; ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('MEMORY', width / 2, height / 2 - 30);
                ctx.font = '40px Arial'; ctx.fillText('#' + (index + 1), width / 2, height / 2 + 30);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;

                    const hNorm = i / baseLightCount;

            const treeLights = new THREE.Points(lightGeometry, lightMaterial);

                    const contentLength = response.headers.get('content-length');
                    const total = contentLength ? parseInt(contentLength) : FILE_SIZES[filename] * 1024 * 1024;

                    const reader = response.body.getReader();
                    let loaded = 0;

                    const stream = new ReadableStream({
                        async start(controller) {
                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                loaded += value.length;
                                progressTracker.updateProgress(filename, loaded);
                                controller.enqueue(value);
                            }
                            controller.close();
                            progressTracker.completeFile(filename);
                        }
                    });

                    return new Response(stream, {
                        headers: response.headers,
                        status: response.status,
                        statusText: response.statusText
                    });
                }

                return originalFetch.apply(this, args);

                }

                return originalXHRSend.apply(this, [body]);

                } else {
                    const s = lerp(obj.scale.x, targetScaleMult, 0.1);
                    obj.scale.set(s, s, s);
                }
            });
            // === 【轨迹球摄像机】 ===
            // 【核心】应用平滑变焦
            STATE.cameraRadius = lerp(STATE.cameraRadius, STATE.targetCameraRadius, 0.05);
            const radius = STATE.cameraRadius;
            if (STATE.mode === 'SCATTER' || STATE.mode === 'INSPECT' || STATE.mode === 'HEART') {
                let targetRotX = 0.001;
                let targetRotY = 0;
                if (STATE.handDetected) {
                    // 【反转手势】
                    targetRotX = -STATE.handPosition.x * 0.008; // 左右: 手左球右
                    // 【反转】垂直手势改为正向（手向上 -> rotY正 -> 球体向上转/相机向下移 -> 看底部）
                    targetRotY = STATE.handPosition.y * 0.008;
                }
                const friction = STATE.handDetected ? 0.1 : 0.02;
                STATE.rotVelX = lerp(STATE.rotVelX, targetRotX, friction);
                STATE.rotVelY = lerp(STATE.rotVelY, targetRotY, friction);
                const forward = camera.position.clone().normalize();
                const tempUp = camera.up.clone().normalize();
                const right = new THREE.Vector3().crossVectors(tempUp, forward).normalize();
                const up = new THREE.Vector3().crossVectors(forward, right).normalize();
                const qYaw = new THREE.Quaternion().setFromAxisAngle(up, -STATE.rotVelX);
                const qPitch = new THREE.Quaternion().setFromAxisAngle(right, -STATE.rotVelY);
                const qFinal = new THREE.Quaternion().multiplyQuaternions(qYaw, qPitch);
                camera.position.applyQuaternion(qFinal);
                camera.up.applyQuaternion(qFinal);
                // 应用变焦后的位置
                camera.position.setLength(radius);
                camera.lookAt(0, 0, 0);
            } else {
                camera.position.lerp(new THREE.Vector3(0, 30, 160), 0.02);
                const currentUp = camera.up.clone();
                const targetUp = new THREE.Vector3(0, 1, 0);
                camera.up.lerp(targetUp, 0.05);
                camera.lookAt(0, 10, 0);
                STATE.rotVelX = 0.001;
                STATE.rotVelY = 0;
                // 重置目标半径
                STATE.targetCameraRadius = 200;
            }
        }
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            updatePhysics(time);
            starSystem.update(time);
            treeLightsSystem.update(time); // 彩灯
            composer.render();
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
