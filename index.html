<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Christmas Tree with Gemini</title>
    <script src="js/mediapipe_camera_utils.js" crossorigin="anonymous"></script>
    <script src="js/mediapipe_control_utils.js" crossorigin="anonymous"></script>
    <script src="js/mediapipe_drawing_utils.js" crossorigin="anonymous"></script>
    <script src="js/mediapipe_hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050810;
            font-family: 'Courier New', Courier, monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 顶部表白文案 */
        #love-quote {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffb3c6;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff3366, 0 0 20px #ff0055, 0 0 30px #ff0055;
            z-index: 20;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            pointer-events: none;
            width: 90%;
            text-align: center;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
        }

        #love-quote.visible {
            opacity: 1;
        }

        /* UI 界面层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-text {
            position: absolute;
            top: 20px;
            left: 0;
            color: rgba(255, 230, 100, 0.9);
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
            font-size: 13px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-left: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 0 10px 10px 0;
            backdrop-filter: blur(4px);
            pointer-events: auto;
            cursor: pointer;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .hud-text.expanded {
            transform: translateX(0);
            z-index: 16;
        }

        .hud-toggle {
            position: absolute;
            top: 20px;
            left: 5px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 215, 0, 0.6);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 215, 0, 0.9);
            font-size: 16px;
            pointer-events: auto;
            z-index: 15;
            backdrop-filter: blur(4px);
            transition: transform 0.3s ease;
            will-change: transform;
        }

        .hud-toggle.slide-right {
            transform: translateX(240px);
        }

        .hud-text h3 {
            margin-top: 0;
            font-size: 16px;
            color: #fff;
        }

        .hud-text p {
            margin: 5px 0;
        }

        #fps-counter {
            position: absolute;
            top: 10px;
            right: 5px;
            color: rgba(0, 255, 255, 0.8);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.4);
            font-size: 11px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 8px;
            border-radius: 3px;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        #device-info {
            position: absolute;
            top: 33px;
            right: 5px;
            color: rgba(0, 255, 255, 0.8);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.4);
            font-size: 11px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 8px;
            border-radius: 3px;
            backdrop-filter: blur(3px);
            pointer-events: none;
        }

        #blessing-overlay {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 20;
        }

        #blessing-content {
            font-size: 24px;
            line-height: 1.6;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 100, 50, 0.6);
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(5px);
            font-family: "Georgia", serif;
        }

        #upload-container {
            position: absolute;
            bottom: 80px;
            right: 30px;
            pointer-events: auto;
        }

        #upload-btn {
            background: linear-gradient(135deg, #b30000, #800000);
            border: 1px solid rgba(255, 215, 0, 0.6);
            color: #ffd700;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 8px;
            font-size: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        #upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 50, 50, 0.5);
            background: #cc0000;
        }

        /* 右下角统一 HUD */
        .right-hud-panel {
            position: absolute;
            bottom: 30px;
            right: 0;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            pointer-events: auto;
            z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-left: 2px solid rgba(100, 200, 255, 0.6);
            border-radius: 10px 0 0 10px;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-hud-panel.expanded {
            transform: translateX(0);
        }

        .right-hud-panel #upload-container {
            position: static;
            bottom: auto;
            right: auto;
        }

        .right-hud-toggle {
            position: absolute;
            bottom: 30px;
            right: 5px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(100, 200, 255, 0.6);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(170, 221, 255, 0.9);
            font-size: 16px;
            pointer-events: auto;
            z-index: 15;
            backdrop-filter: blur(4px);
            transition: transform 0.3s ease;
            will-change: transform;
        }

        .right-hud-toggle.slide-left {
            transform: translateX(-190px);
        }

        #gesture-toggle-btn {
            background: linear-gradient(135deg, #1a3a5e, #0f2440);
            border: 1px solid rgba(100, 200, 255, 0.6);
            color: #aaddff;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 8px;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(26, 58, 94, 0.6);
            font-family: 'Courier New', Courier, monospace;
        }

        #gesture-toggle-btn:hover {
            transform: scale(1.05);
            background: #2f6e9e;
            color: #fff;
            box-shadow: 0 0 25px rgba(47, 110, 158, 0.8);
        }

        #gesture-toggle-btn.disabled {
            background: linear-gradient(135deg, #3a3a3a, #222);
            border-color: rgba(150, 150, 150, 0.4);
            color: #aaa;
            box-shadow: none;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050810;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-size: 18px;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #333;
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 进度条样式 */
        #progress-container {
            width: 80%;
            max-width: 600px;
            margin-top: 30px;
        }

        #main-progress-wrapper { margin-bottom: 20px; }

        #main-progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ffd700;
        }

        #main-progress-bar {
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        #main-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #050810;
        }

        #sub-progress-list { max-height: 200px; overflow-y: auto; }

        .sub-progress-item {
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .sub-progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .sub-progress-name {
            color: #aaddaa;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sub-progress-stats {
            color: #88aaff;
            font-size: 11px;
            margin-left: 10px;
        }

        .sub-progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .sub-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.2s ease;
        }

        #input_video {
            display: none;
        }

        #debug-cam {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 90px;
            background: #000;
            border: 1px solid #333;
            opacity: 0.8;
            z-index: 5;
            transform: scaleX(-1);
            border-radius: 5px;
        }

        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            #ui-layer { padding: 10px; }
            .hud-text { top: 10px; left: 10px; font-size: 11px; padding: 10px; max-width: 180px; }
            .hud-toggle.slide-right { transform: translateX(200px); }
            .hud-text h3 { font-size: 13px; margin-bottom: 5px; }
            .hud-text p { margin: 3px 0; line-height: 1.4; }
            .right-hud-panel { bottom: 15px; }
            .right-hud-toggle { bottom: 15px; right: 5px; }
            .right-hud-toggle.slide-left { transform: translateX(-160px); }
            #upload-btn { padding: 10px 16px; font-size: 11px; }
            #gesture-toggle-btn { padding: 8px 14px; font-size: 11px; }
            #debug-cam { bottom: 10px; left: 10px; width: 80px; height: 60px; }
            #blessing-overlay { top: 25%; width: 90%; }
            #blessing-content { font-size: 16px; padding: 20px; line-height: 1.5; }
            #progress-container { width: 90%; max-width: 400px; margin-top: 20px; }
            #love-quote { font-size: 16px; top: 30px; }
        }
    </style>
</head>

<body>
    <div id="love-quote">爱情就像是一棵树，同沐朝阳，共揽晚风，岁岁年年共享一片天空。</div>
    <div id="loader">
        <div class="spinner"></div>
        <div>正在准备爱的种子...<br><span style="font-size:12px; opacity:0.7">请允许摄像头权限以启用魔法手势</span></div>
        <div id="progress-container">
            <div id="main-progress-wrapper">
                <div id="main-progress-label">
                    <span>总体进度</span>
                    <span id="main-progress-percent">0%</span>
                </div>
                <div id="main-progress-bar">
                    <div id="main-progress-fill"></div>
                </div>
            </div>
            <div id="sub-progress-list"></div>
        </div>
    </div>
    <video id="input_video"></video>
    <canvas id="debug-cam"></canvas>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div class="hud-toggle" id="hud-toggle">☰</div>
        <div class="hud-text" id="hud-text">
            <h3>魔法手势指南</h3>
            <p>🫶 <b>双手爱心</b>: 唤醒爱的种子</p>
            <p>✊ <b>握拳</b>: 呼唤圣诞树</p>
            <p>✌️ <b>V字手势</b>: 变成爱心</p>
            <p>🖐 <b>张开</b>: 释放星空</p>
            <p>🤏 <b>捏合</b>: 拾取正面照片</p>
            <p>👋 <b>移动</b>: 旋转球体视角</p>
        </div>
        <div id="fps-counter">FPS: 0</div>
        <div id="device-info"></div>
        <div id="blessing-overlay">
            <div id="blessing-content"></div>
        </div>
        <div class="right-hud-toggle" id="right-hud-toggle">☰</div>
        <div class="right-hud-panel" id="right-hud-panel">
            <div id="upload-container">
                <input type="file" id="file-input" accept="image/*" multiple style="display:none;">
                <button id="upload-btn" onclick="document.getElementById('file-input').click()">上传照片挂饰</button>
            </div>
            <button id="gesture-toggle-btn">🖐 手势识别: 开启</button>
        </div>
    </div>
    <script type="importmap">
{
  "imports": {
    "three": "./js/three.module.js",
    "three/addons/": "./js/addons/"
  }
}
</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ================= 加载进度跟踪 =================
        const FILE_SIZES = {
            'hand_landmark_full.tflite': 5.5,
            'hands_solution_packed_assets.data': 4.3,
            'hands_solution_simd_wasm_bin.wasm': 6,
            'default': 1
        };

        const progressTracker = {
            files: {},
            totalBytes: 0,
            loadedBytes: 0,
            startTime: Date.now(),

            addFile(filename, sizeMB) {
                this.files[filename] = {
                    size: sizeMB * 1024 * 1024,
                    loaded: 0,
                    startTime: null,
                    speed: 0,
                    eta: 0
                };
                this.totalBytes += sizeMB * 1024 * 1024;
            },

            updateProgress(filename, loaded) {
                const file = this.files[filename];
                if (!file) return;

                if (!file.startTime) {
                    file.startTime = Date.now();
                }

                const elapsed = (Date.now() - file.startTime) / 1000;
                file.loaded = loaded;

                if (elapsed > 0) {
                    file.speed = loaded / elapsed / 1024; // KB/s
                    const remaining = file.size - loaded;
                    file.eta = file.speed > 0 ? remaining / 1024 / file.speed : 0;
                }

                this.loadedBytes = Object.values(this.files).reduce((sum, f) => sum + f.loaded, 0);
                this.updateUI();
            },

            completeFile(filename) {
                const file = this.files[filename];
                if (file) {
                    file.loaded = file.size;
                    this.loadedBytes = Object.values(this.files).reduce((sum, f) => sum + f.loaded, 0);
                    this.updateUI();
                }
            },

            updateUI() {
                const percent = this.totalBytes > 0 ? (this.loadedBytes / this.totalBytes * 100) : 0;
                const mainFill = document.getElementById('main-progress-fill');
                const mainPercent = document.getElementById('main-progress-percent');

                if (mainFill) mainFill.style.width = percent + '%';
                if (mainPercent) mainPercent.textContent = percent.toFixed(1) + '%';

                const subList = document.getElementById('sub-progress-list');
                if (subList) {
                    subList.innerHTML = '';
                    Object.entries(this.files).forEach(([filename, file]) => {
                        const filePercent = file.size > 0 ? (file.loaded / file.size * 100) : 0;
                        const speedText = file.speed > 0 ? `${file.speed.toFixed(1)} KB/s` : '计算中...';
                        const etaText = file.eta > 0 ? `${file.eta.toFixed(1)}s` : '--';

                        const item = document.createElement('div');
                        item.className = 'sub-progress-item';
                        item.innerHTML = `
                            <div class="sub-progress-header">
                                <span class="sub-progress-name">${filename}</span>
                                <span class="sub-progress-stats">${speedText} | ${etaText}</span>
                            </div>
                            <div class="sub-progress-bar">
                                <div class="sub-progress-fill" style="width: ${filePercent}%"></div>
                            </div>
                        `;
                        subList.appendChild(item);
                    });
                }
            }
        };

        Object.entries(FILE_SIZES).forEach(([name, size]) => {
            if (name !== 'default') {
                progressTracker.addFile(name, size);
            }
        });

        const _isMobile = /Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // ================= 配置参数 =================
        const CONFIG = {
            colors: {
                bg: 0x050810,
                green: 0x2f9e4f,
                gold: 0xffd700,
                red: 0xff3333,
                white: 0xffffff,
                heart: 0xff3366
            },
            particleCount: 2000,
            photoCount: 40,
            treeHeight: 65,
            treeRadius: 28,
            heartSize: 4,
            explodeRadius: 60,
            heartPhotoGather: 1.1,
            // 双手爱心：手腕最小距离（确认是两只独立的手）
            heartMinWristDist: 0.15,
            // 双手爱心：指尖接近阈值（越小越严格）
            heartFingerThreshold: 0.05,
            // 双手爱心：需要连续多少帧满足才触发（防抖）
            heartConfirmFrames: 10,
            // 其它手势防抖：连续多少帧满足才触发
            gestureConfirmFrames: 2,
            // 手势推理优化参数
            gesture: {
                // 各模式下每 N 帧推理一次（值=2 表示每 2 帧推理 1 次）
                frameSkip: {
                    SEED: _isMobile ? 4 : 2,
                    GROWING: _isMobile ? 4 : 2,
                    TREE: _isMobile ? 8 : 5,
                    SCATTER: _isMobile ? 4 : 2,
                    INSPECT: _isMobile ? 4 : 2,
                    HEART: _isMobile ? 4 : 3,
                    default: _isMobile ? 4 : 3
                },
                // 各模式下检测的最大手数（SEED 需要双手检测爱心，其余只需单手）
                maxNumHands: {
                    SEED: 2,
                    GROWING: 1,
                    TREE: 1,
                    SCATTER: 1,
                    INSPECT: 1,
                    HEART: 1,
                    default: 1
                },
                // 手部最小尺寸阈值（手腕到中指根的距离，归一化坐标）
                // 低于此值的手视为太小/太远，不参与手势识别
                minHandSize: 0.13
            }
        };
        let gestureEnabled = true;
        let cameraUtils = null;
        let handFrameSkip = 0;
        let lastHandMaxNumHands = 2;
        let handsInstance = null;

        // 动态帧跳过：根据当前模式返回跳帧数
        function getFrameSkip() {
            const skips = CONFIG.gesture.frameSkip;
            return skips[STATE.mode] ?? skips.default;
        }

        // 动态 maxNumHands：根据当前模式返回最大手数
        function getMaxNumHands() {
            const hands = CONFIG.gesture.maxNumHands;
            return hands[STATE.mode] ?? hands.default;
        }

        const STATE = {
            mode: 'SEED', // 【初始状态改为种子】
            growProgress: 0, // 生长进度 0 到 1
            gestureUnlockTime: 0, // 手势解锁时间戳（生长动画完成后1秒）
            handDetected: false,
            handPosition: { x: 0, y: 0 },
            pinchDistance: 1,
            activePhotoIndex: 0,
            lastModeTime: 0,
            rotVelX: 0.001,
            rotVelY: 0,
            cameraRadius: 200,
            targetCameraRadius: 200,
            heartProgress: 0, 
            isExploding: false,
            explodeProgress: 0,
            explodeTargetMode: 'TREE',
            heartFrameCount: 0,
            gestureFrameCount: 0,
            lastGestureType: null
        };

        // ================= 1. Three.js 场景初始化 =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.colors.bg);
        scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.012);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 200); 
        camera.up.set(0, 1, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.9;
        container.appendChild(renderer.domElement);
        const renderScene = new RenderPass(scene, camera);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        
        let bloomPass = null;
        if (!_isMobile) {
            const bloomDiv = 2;
            const bloomResolution = new THREE.Vector2(
                Math.floor(window.innerWidth / bloomDiv),
                Math.floor(window.innerHeight / bloomDiv)
            );
            bloomPass = new UnrealBloomPass(bloomResolution, 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.3;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.5;
            composer.addPass(bloomPass);
        }

        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(CONFIG.colors.gold, 8.0, 500);
        pointLight.position.set(20, 40, 40);
        scene.add(pointLight);
        const frontLight = new THREE.DirectionalLight(0xffeebb, 3.5);
        frontLight.position.set(0, 20, 100);

        ];

        function getTreeLayerRadius(y) {
            for (const layer of TREE_LAYERS) {
                if (y <= layer.yTop && y >= layer.yBottom) {
                    const t = (y - layer.yBottom) / (layer.yTop - layer.yBottom);
                    return layer.rBottom + (layer.rTop - layer.rBottom) * t;
                }
            }
            if (y > TREE_LAYERS[0].yTop) return TREE_LAYERS[0].rTop;
            return TREE_LAYERS[TREE_LAYERS.length - 1].rBottom;
        }

        function getTreeSurfacePosition(hNorm, angle, offset = 0) {
            const y = (hNorm * CONFIG.treeHeight) - (CONFIG.treeHeight / 2);
            const radius = getTreeLayerRadius(y) + offset;
            return new THREE.Vector3(
                Math.cos(angle) * radius,
                y,

        function createBranchParticles() {
            const particleCount = _isMobile ? 1000 : 2000;
            const branchGeo = new THREE.ConeGeometry(0.22, 1.0, _isMobile ? 3 : 4);
            const branchMat = new THREE.MeshStandardMaterial({
                color: 0x267a3c, roughness: 0.85, metalness: 0.05, emissive: 0x0f4a22, emissiveIntensity: 0.15
            });
            const branches = new THREE.InstancedMesh(branchGeo, branchMat, particleCount);
            branches.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            scene.add(branches);

            const branchData = [];
            const branchTempObj = new THREE.Object3D();
            const layers = 8;
            const branchesPerLayer = 16;
            const particlesPerBranch = Math.floor(particleCount / (layers * branchesPerLayer));
            let idx = 0;

            for (let l = 0; l < layers; l++) {
                const hNorm = 0.08 + (l / (layers - 1)) * 0.82;
                const y = (hNorm * CONFIG.treeHeight) - (CONFIG.treeHeight / 2);
                const baseRadius = getTreeLayerRadius(y) * 0.85;

                for (let b = 0; b < branchesPerLayer; b++) {
                    const branchAngle = (b / branchesPerLayer) * Math.PI * 2 + l * 0.35;
                    const branchLength = baseRadius * (0.75 + Math.random() * 0.35);
                    const droop = 0.25 + Math.random() * 0.25;

                    for (let p = 0; p < particlesPerBranch; p++) {
                        if (idx >= particleCount) break;
                        const t = p / (particlesPerBranch - 1 || 1);
                        const r = t * branchLength;
                        const x = Math.cos(branchAngle) * r;
                        const z = Math.sin(branchAngle) * r;
                        const py = y - Math.sin(t * Math.PI) * branchLength * droop;

                        branchData.push({
                            basePos: new THREE.Vector3(x, py, z),
                            angle: branchAngle,
                            baseY: y,
                            t: t,
                            phase: Math.random() * Math.PI * 2,
                            scale: 0.7 + Math.random() * 0.8,
                            rot: new THREE.Euler(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI)
                        });

                        branchTempObj.position.set(x, py, z);
                        branchTempObj.rotation.copy(branchData[idx].rot);
                        branchTempObj.scale.setScalar(branchData[idx].scale);
                        branchTempObj.updateMatrix();
                        branches.setMatrixAt(idx, branchTempObj.matrix);
                        idx++;
                    }
                }
            }
            branches.instanceMatrix.needsUpdate = true;
            return { mesh: branches, data: branchData };
        }

        function createPhotoTexture(img, index, isUserUpload = false) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const borderThickness = 20;
            let width, height;
            if (isUserUpload && img) {
                const maxDim = 1024;
                let scale = 1;
                if (img.width > maxDim || img.height > maxDim) scale = Math.min(maxDim / img.width, maxDim / img.height);
                const imgW = img.width * scale;
                const imgH = img.height * scale;
                width = imgW + borderThickness * 2;
                height = imgH + borderThickness * 2;
                canvas.width = width; canvas.height = height;
                const gradient = ctx.createLinearGradient(0, 0, width, height);
                gradient.addColorStop(0, "#ffd700"); gradient.addColorStop(0.5, "#ffeb3b"); gradient.addColorStop(1, "#fbc02d");
                ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);
                ctx.drawImage(img, borderThickness, borderThickness, imgW, imgH);
            } else {
                width = 400; height = 500;
                canvas.width = width; canvas.height = height;
                const gradient = ctx.createLinearGradient(0, 0, width, height);
                gradient.addColorStop(0, "#ffd700"); gradient.addColorStop(0.5, "#ffeb3b"); gradient.addColorStop(1, "#fbc02d");
                ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);
                const border = 20;
                const photoW = width - border * 2;
                const photoH = height - border * 2;
                const grd = ctx.createLinearGradient(border, border, border, border + photoH);
                grd.addColorStop(0, "#b30000"); grd.addColorStop(1, "#800000");
                ctx.fillStyle = grd; ctx.fillRect(border, border, photoW, photoH);
                ctx.fillStyle = '#ffd700'; ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('MEMORY', width / 2, height / 2 - 30);
                ctx.font = '40px Arial'; ctx.fillText('#' + (index + 1), width / 2, height / 2 + 30);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.repeat.set(-1, 1);
            tex.wrapS = THREE.RepeatWrapping;
            tex.center.set(0.5, 0.5);
            return tex;
        }

        function createTreeLights() {
            const baseLightCount = 500;   
            const maxLightCount = _isMobile ? 3350 : 10000;   
            const lightGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(maxLightCount * 3);
            const colors = new Float32Array(maxLightCount * 3);
            const sizes = new Float32Array(maxLightCount);
            const phases = new Float32Array(maxLightCount);
            
            const treePositions = [];     
            const scatterPositions = [];  
            const heartPositions = [];    
            const lightPhases = [];
            const colorSequence = [
                new THREE.Color(0xff0000), new THREE.Color(0x00ff00), new THREE.Color(0x0000ff), 
                new THREE.Color(0xffff00), new THREE.Color(0xff00ff), new THREE.Color(0x00ffff)
            ];

            function generateHeartPositions(count) {
                const positions = [];
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    const angle = t * Math.PI * 2;
                    const x = CONFIG.heartSize * 16 * Math.pow(Math.sin(angle), 3);
                    const y = CONFIG.heartSize * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                    const z = Math.sin(angle * 5) * 5; 
                    positions.push(new THREE.Vector3(x, y, z));
                }
                return positions;
            }
            const heartLightPositions = generateHeartPositions(maxLightCount);

            for (let i = 0; i < maxLightCount; i++) {
                const phase = Math.random() * Math.PI * 2;
                lightPhases.push(phase);
                let treePos;
                if (i < baseLightCount) {
                    const hNorm = i / baseLightCount;
                    const treeAngle = i * 0.8 + Math.sin(i * 0.3) * 0.5;
                    treePos = getTreeSurfacePosition(hNorm, treeAngle, 0.8);
                } else {
                    treePos = new THREE.Vector3(0, 0, 0);
                }
                treePositions.push(treePos);
                
                const scatterRadius = 80 + Math.random() * 50;
                const phi = Math.acos(-1 + 2 * Math.random());
                const theta = Math.sqrt(Math.PI * maxLightCount) * phi + i * 0.1;
                const scatterPos = new THREE.Vector3().setFromSphericalCoords(scatterRadius, phi, theta);
                scatterPositions.push(scatterPos);
                
                heartPositions.push(heartLightPositions[i % heartLightPositions.length]);
                
                if (i < baseLightCount) {
                    positions[i * 3] = treePos.x; positions[i * 3 + 1] = treePos.y; positions[i * 3 + 2] = treePos.z;
                } else {
                    positions[i * 3] = scatterPos.x; positions[i * 3 + 1] = scatterPos.y; positions[i * 3 + 2] = scatterPos.z;
                }
                const color = colorSequence[i % colorSequence.length];
                colors[i * 3] = color.r; colors[i * 3 + 1] = color.g; colors[i * 3 + 2] = color.b;
                sizes[i] = 8.2 + Math.sin(i * 0.5) * 1.3;
                phases[i] = phase;
            }
            lightGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            lightGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            lightGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            lightGeometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
            
            const lightMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uPixelRatio: { value: renderer.getPixelRatio() },
                    uMode: { value: 0.0 }, 
                    uHeartProgress: { value: 0.0 }, 
                    uMaxIndex: { value: baseLightCount }
                },
                vertexShader: `
attribute float size;
attribute float phase;
varying vec3 vColor;
varying float vBrightness;
uniform float uTime;
uniform float uPixelRatio;
uniform float uMode;
uniform float uHeartProgress;
uniform float uMaxIndex;
int getVertexIndex() { return int(gl_VertexID); }
void main() {
vColor = color;
int vertexIndex = getVertexIndex();
if (float(vertexIndex) >= uMaxIndex) { gl_Position = vec4(0.0, -1000.0, 0.0, 1.0); return; }
float twinkleSpeed = 3.0 + phase * 2.0;
float twinkle = 0.6 + 0.4 * sin(uTime * twinkleSpeed + phase * 6.2831);
float sequencePos = mod(uTime * 4.0 + phase, 6.2831);
float distanceToWave = abs(sequencePos - 3.1415);
float sequenceBrightness = smoothstep(2.0, 0.0, distanceToWave);
float scatterBrightness = 0.5 + 0.5 * sin(uTime * 2.0 + phase * 5.0);
float heartPulse = 0.5 + 0.5 * sin(uTime * 3.0 + phase * 2.0);
vBrightness = mix(mix(sequenceBrightness, scatterBrightness, uMode), heartPulse, uHeartProgress) * twinkle * 1.5;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
gl_PointSize = size * uPixelRatio * vBrightness * (100.0 / -mvPosition.z);
gl_PointSize = max(gl_PointSize, 0.8);
gl_Position = projectionMatrix * mvPosition;
}
`,
                fragmentShader: `
varying vec3 vColor;
varying float vBrightness;
void main() {
vec2 center = gl_PointCoord - vec2(0.5);
float dist = length(center);
if (dist > 0.5) discard;
float glow = smoothstep(0.5, 0.0, dist);
float core = smoothstep(0.3, 0.0, dist) * 1.5;
float alpha = (glow + core) * vBrightness;
vec2 absCenter = abs(center);
float cross = smoothstep(0.05, 0.0, min(absCenter.x, absCenter.y)) * 0.8;
alpha += cross * vBrightness * 0.5;
gl_FragColor = vec4(vColor * (0.5 + vBrightness), alpha);
}
`,
                transparent: true, vertexColors: true, depthWrite: false, blending: THREE.AdditiveBlending,
            });
            const treeLights = new THREE.Points(lightGeometry, lightMaterial);
            scene.add(treeLights);
            
            return {
                mesh: treeLights,
                update(time) {
                    const positions = lightGeometry.attributes.position.array;
                    let targetMode = 0.0;
                    let targetHeartProgress = 0.0;
                    let targetMaxIndex = baseLightCount;
                    
                    if (STATE.mode === 'TREE' || STATE.mode === 'SEED' || STATE.mode === 'GROWING') {
                        targetMode = 0.0;
                        targetHeartProgress = 0.0;
                        targetMaxIndex = baseLightCount;
                    } else if (STATE.mode === 'SCATTER' || STATE.mode === 'INSPECT') {
                        targetMode = 1.0;
                        targetHeartProgress = 0.0;
                        targetMaxIndex = maxLightCount;
                    } else if (STATE.mode === 'HEART') {
                        targetMode = 0.5;
                        targetHeartProgress = 1.0;
                        targetMaxIndex = maxLightCount;
                    }
                    
                    lightMaterial.uniforms.uMode.value = THREE.MathUtils.lerp(lightMaterial.uniforms.uMode.value, targetMode, 0.05);
                    lightMaterial.uniforms.uHeartProgress.value = THREE.MathUtils.lerp(lightMaterial.uniforms.uHeartProgress.value, targetHeartProgress, 0.05);
                    lightMaterial.uniforms.uMaxIndex.value = THREE.MathUtils.lerp(lightMaterial.uniforms.uMaxIndex.value, targetMaxIndex, 0.03);
                    
                    if (STATE.isExploding && treeLightsSystem.explodeStartPositions && treeLightsSystem.explodeDirections) {
                        const startPositions = treeLightsSystem.explodeStartPositions;
                        const directions = treeLightsSystem.explodeDirections;
                        const eased = 1 - Math.pow(1 - STATE.explodeProgress, 3);
                        const explodeRadius = CONFIG.explodeRadius;
                        for (let i = 0; i < maxLightCount; i++) {
                            const i3 = i * 3;
                            positions[i3] = startPositions[i3] + directions[i3] * explodeRadius * eased;
                            positions[i3 + 1] = startPositions[i3 + 1] + directions[i3 + 1] * explodeRadius * eased;
                            positions[i3 + 2] = startPositions[i3 + 2] + directions[i3 + 2] * explodeRadius * eased;
                        }
                        lightGeometry.attributes.position.needsUpdate = true;
                        lightMaterial.uniforms.uTime.value = time;
                        return;
                    }
                    
                    const cosR = Math.cos(time * 0.4);
                    const sinR = Math.sin(time * 0.4);
                    for (let i = 0; i < maxLightCount; i++) {
                        if (i >= lightMaterial.uniforms.uMaxIndex.value) continue;
                        const phase = lightPhases[i];
                        const i3 = i * 3;
                        if (lightMaterial.uniforms.uHeartProgress.value > 0.5) {
                            const hx = heartPositions[i].x; const hy = heartPositions[i].y; const hz = heartPositions[i].z;
                            positions[i3] = hx * (0.8 + Math.sin(time * 1.5 + phase * 0.5) * 0.1);
                            positions[i3 + 1] = hy + Math.sin(time * 2.0 + phase) * 2.0;
                            positions[i3 + 2] = hz * (0.8 + Math.sin(time * 1.7 + phase * 0.7) * 0.1);
                        } else if (lightMaterial.uniforms.uMode.value < 0.5) {
                            if (i < baseLightCount) {
                                const tx = treePositions[i].x; const ty = treePositions[i].y; const tz = treePositions[i].z;
                                let finalX = tx * cosR - tz * sinR;
                                let finalY = ty + Math.sin(time * 1.5 + phase) * 3.3;
                                let finalZ = tx * sinR + tz * cosR;

                                // 种子生长螺旋效果
                                if (STATE.mode === 'SEED' || STATE.mode === 'GROWING') {
                                    const t = STATE.growProgress;
                                    const normalizedY = (ty + 20) / 60;
                                    const localT = Math.max(0, Math.min(1, (t - normalizedY * 0.5) / 0.5));
                                    const angle = (1 - localT) * 15;
                                    const r = Math.sqrt(finalX**2 + finalZ**2) * localT;
                                    const currentAngle = Math.atan2(finalZ, finalX) + angle;
                                    finalX = r * Math.cos(currentAngle);
                                    finalZ = r * Math.sin(currentAngle);
                                    finalY = -20 + (finalY + 20) * localT;
                                }

                                positions[i3] = finalX;
                                positions[i3 + 1] = finalY;
                                positions[i3 + 2] = finalZ;
                            } else {
                                positions[i3] = 0; positions[i3 + 1] = 0; positions[i3 + 2] = 0;
                            }
                        } else {
                            const sx = scatterPositions[i].x; const sy = scatterPositions[i].y + Math.sin(time + phase) * 3; const sz = scatterPositions[i].z;
                            const dx = sx - camera.position.x; const dy = sy - camera.position.y; const dz = sz - camera.position.z;
                            const distSq = dx * dx + dy * dy + dz * dz;
                            let fx = sx, fy = sy, fz = sz;
                            if (distSq < 10000) {
                                const dist = Math.sqrt(distSq);
                                const pullStrength = Math.max(0, 1 - dist / 100) * 20;
                                if (dist > 0.001) {
                                    fx += (camera.position.x - sx) / dist * pullStrength; fy += (camera.position.y - sy) / dist * pullStrength; fz += (camera.position.z - sz) / dist * pullStrength;
                                }
                            }
                            positions[i3] = fx; positions[i3 + 1] = fy; positions[i3 + 2] = fz;
                        }
                    }
                    
                    if (treeLightsSystem.transitionProgress < 1 && treeLightsSystem.transitionStartPositions) {
                        treeLightsSystem.transitionProgress += 0.02;
                        const t = treeLightsSystem.transitionProgress;
                        const startPositions = treeLightsSystem.transitionStartPositions;
                        for (let i = 0; i < maxLightCount; i++) {
                            const i3 = i * 3;
                            positions[i3] = startPositions[i3] * (1 - t) + positions[i3] * t;
                            positions[i3 + 1] = startPositions[i3 + 1] * (1 - t) + positions[i3 + 1] * t;
                            positions[i3 + 2] = startPositions[i3 + 2] * (1 - t) + positions[i3 + 2] * t;
                        }
                    }
                    lightGeometry.attributes.position.needsUpdate = true;
                    lightMaterial.uniforms.uTime.value = time;
                }
            };
        }
        const treeLightsSystem = createTreeLights();

        function captureExplodeStartPositions() {
            const positions = treeLightsSystem.mesh.geometry.attributes.position.array;
            const maxLightCount = positions.length / 3;
            treeLightsSystem.explodeStartPositions = new Float32Array(positions.length);
            treeLightsSystem.explodeStartPositions.set(positions);
            treeLightsSystem.explodeDirections = new Float32Array(positions.length);
            for (let i = 0; i < maxLightCount; i++) {
                const i3 = i * 3;
                const dir = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
                treeLightsSystem.explodeDirections[i3] = dir.x; treeLightsSystem.explodeDirections[i3 + 1] = dir.y; treeLightsSystem.explodeDirections[i3 + 2] = dir.z;
            }
            particleData.forEach(p => {
                p.explodeStartPos = p.currentPos.clone();

        {

                }
            };
            window.addEventListener('error', suppressImgErrors, true);

            function probeImage(url) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = url;
                });
            }

            (async () => {
                const foundUrls = [];
                for (let i = 1; i <= MAX_SCAN; i++) {
                    for (const ext of extensions) {
                        if (await probeImage(`${IMAGE_DIR}${i}.${ext}`)) {
                            foundUrls.push(`${IMAGE_DIR}${i}.${ext}`);
                            break;
                        }
                    }
                }
                // 探测完成，恢复全局错误输出
                window.removeEventListener('error', suppressImgErrors, true);

                if (foundUrls.length === 0) return;

                const photoObjects = objects.filter(o => o.userData.isPhoto);
                foundUrls.forEach((url, idx) => {
                    if (idx >= photoObjects.length) return;

            // 【新增】双手爱心检测与生长屏蔽逻辑
            // 生长动画期间 + 生长完成后1秒内屏蔽其他手势
            if (STATE.mode === 'SEED' || STATE.mode === 'GROWING' || (STATE.mode === 'TREE' && Date.now() < STATE.gestureUnlockTime)) {
                if (STATE.mode === 'SEED' && results.multiHandLandmarks && results.multiHandLandmarks.length >= 2) {
                    const hand1 = results.multiHandLandmarks[0];
                    const hand2 = results.multiHandLandmarks[1];

                    // 过滤太小的手（距离摄像头太远）
                    const h1Size = Math.hypot(hand1[9].x - hand1[0].x, hand1[9].y - hand1[0].y);
                    const h2Size = Math.hypot(hand2[9].x - hand2[0].x, hand2[9].y - hand2[0].y);
                    const bothHandsBigEnough = h1Size >= CONFIG.gesture.minHandSize && h2Size >= CONFIG.gesture.minHandSize;
                    // 先确认两只手的手腕距离够远（排除单手误检为双手）
                    const wristDist = Math.hypot(hand1[0].x - hand2[0].x, hand1[0].y - hand2[0].y);
                    const wristsFarEnough = wristDist >= CONFIG.heartMinWristDist;
                    // 双手拇指(4)和食指(8)指尖距离
                    const thumbDist = Math.hypot(hand1[4].x - hand2[4].x, hand1[4].y - hand2[4].y);
                    const indexDist = Math.hypot(hand1[8].x - hand2[8].x, hand1[8].y - hand2[8].y);
                    const fingersClose = thumbDist < CONFIG.heartFingerThreshold && indexDist < CONFIG.heartFingerThreshold;

                    if (!bothHandsBigEnough || !wristsFarEnough || !fingersClose) {
                        STATE.heartFrameCount = 0;
                    } else {
                        STATE.heartFrameCount++;
                        if (STATE.heartFrameCount >= CONFIG.heartConfirmFrames) {
                            STATE.mode = 'GROWING';
                            STATE.lastModeTime = Date.now();
                            STATE.heartFrameCount = 0;
                            const q = document.getElementById('love-quote');
                            if (q) q.classList.add('visible');
                        }
                    }
                } else {
                    STATE.heartFrameCount = 0;
                }
                if (results.multiHandLandmarks) {
                    for (const landmarks of results.multiHandLandmarks) {
                        if (window.drawConnectors && window.HAND_CONNECTIONS) {
                            window.drawConnectors(debugCtx, landmarks, window.HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });
                        }
                    }
                }
                debugCtx.restore();
                return; // 未长成树前屏蔽其他手势
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                STATE.handDetected = true;
                const landmarks = results.multiHandLandmarks[0];
                if (window.drawConnectors && window.HAND_CONNECTIONS) {
                    window.drawConnectors(debugCtx, landmarks, window.HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 2 });
                }
                const palmX = landmarks[9].x; const palmY = landmarks[9].y;
                STATE.handPosition.x = (palmX - 0.5) * 3.0;
                STATE.handPosition.y = (palmY - 0.5) * 3.0;
                
                const wrist = landmarks[0];
                const middleMCP = landmarks[9];
                const handSize = Math.hypot(middleMCP.x - wrist.x, middleMCP.y - wrist.y);

                // 手太小（距离太远）则不参与手势识别
                if (handSize < CONFIG.gesture.minHandSize) {
                    STATE.handDetected = false;
                    debugCtx.restore();
                    return;
                }

                const minHand = 0.05; const maxHand = 0.25;
                const minRad = 140; const maxRad = 200;
                let t = (handSize - minHand) / (maxHand - minHand);
                t = Math.max(0, Math.min(1, t));
                STATE.targetCameraRadius = (1 - t) * (maxRad - minRad) + minRad;
                
                const isFingerExtended = (tipIdx, pipIdx) => {
                    const dTip = Math.hypot(landmarks[tipIdx].x - landmarks[0].x, landmarks[tipIdx].y - landmarks[0].y);
                    const dPip = Math.hypot(landmarks[pipIdx].x - landmarks[0].x, landmarks[pipIdx].y - landmarks[0].y);
                    return dTip > dPip * 1.1;
                };
                
                const indexExt = isFingerExtended(8, 6);   
                const middleExt = isFingerExtended(12, 10); 
                const ringExt = isFingerExtended(16, 14);   
                const pinkyExt = isFingerExtended(20, 18);  
                
                const vGesture = indexExt && middleExt && !ringExt && !pinkyExt;
                const extendedCount = [indexExt, middleExt, ringExt, pinkyExt].filter(Boolean).length;
                const pinchDist = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y);
                STATE.pinchDistance = pinchDist;
                const now = Date.now();

                // 识别当前手势类型
                let gestureType = null;
                if (vGesture && !STATE.isExploding && STATE.mode !== 'HEART') {
                    gestureType = 'V';
                } else if (pinchDist < 0.05 && extendedCount >= 1 && STATE.mode !== 'INSPECT') {
                    gestureType = 'PINCH';
                } else if (extendedCount >= 4 && STATE.mode !== 'SCATTER' && pinchDist > 0.1) {
                    gestureType = 'OPEN';
                } else if (extendedCount === 0 && !STATE.isExploding && STATE.mode !== 'TREE' && pinchDist > 0.1) {
                    gestureType = 'FIST';
                }

                // 防抖：连续帧计数
                if (gestureType === STATE.lastGestureType && gestureType !== null) {
                    STATE.gestureFrameCount++;
                } else {
                    STATE.gestureFrameCount = gestureType !== null ? 1 : 0;
                    STATE.lastGestureType = gestureType;
                }

                if (STATE.gestureFrameCount >= CONFIG.gestureConfirmFrames) {
                    STATE.gestureFrameCount = 0;
                    if (gestureType === 'V') {
                        STATE.lastModeTime = now;
                        STATE.targetCameraRadius = 120;
                        if (STATE.mode === 'TREE') {
                            STATE.isExploding = true;
                            STATE.explodeTargetMode = 'HEART';
                            STATE.explodeProgress = 0;
                            captureExplodeStartPositions();

                    } else if (gestureType === 'PINCH') {

                const url = args[0];

                    const response = await originalFetch.apply(this, args);
                    const contentLength = response.headers.get('content-length');
                    const total = contentLength ? parseInt(contentLength) : FILE_SIZES[filename] * 1024 * 1024;
                    const reader = response.body.getReader();
                    let loaded = 0;
                    const stream = new ReadableStream({
                        async start(controller) {
                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                loaded += value.length;
                                progressTracker.updateProgress(filename, loaded);
                                controller.enqueue(value);
                            }
                            controller.close();
                            progressTracker.completeFile(filename);
                        }
                    });
                    return new Response(stream, { headers: response.headers, status: response.status, statusText: response.statusText });
                }
                return originalFetch.apply(this, args);
            };

            const originalXHROpen = XMLHttpRequest.prototype.open;
            const originalXHRSend = XMLHttpRequest.prototype.send;
            XMLHttpRequest.prototype.open = function(method, url, ...rest) {
                this._trackedUrl = url;

                return originalXHROpen.apply(this, [method, url, ...rest]);
            };
            XMLHttpRequest.prototype.send = function(body) {

                cameraUtils.start();

        function createStarField() {
            const starCount = _isMobile ? 4000 : 8000;
            const sizeMultiplier = _isMobile ? 1.3 : 1.0;
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);
            const starPhases = new Float32Array(starCount); 
            const colorPalette = [
                new THREE.Color(0xffffff), new THREE.Color(0xaaccff), new THREE.Color(0xffeedd), 
                new THREE.Color(0xffd700), new THREE.Color(0xff9999), new THREE.Color(0xccddff)
            ];
            const colorWeights = [0.45, 0.2, 0.2, 0.06, 0.04, 0.05]; 
            function weightedRandomColor() {
                let r = Math.random();
                let cumulative = 0;
                for (let i = 0; i < colorWeights.length; i++) {
                    cumulative += colorWeights[i];
                    if (r < cumulative) return colorPalette[i];
                }
                return colorPalette[0];
            }
            for (let i = 0; i < starCount; i++) {
                const radius = 150 + Math.random() * 300;
                const phi = Math.acos(-1 + 2 * Math.random());
                const theta = Math.random() * Math.PI * 2;
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);
                const col = weightedRandomColor();
                starColors[i * 3] = col.r; starColors[i * 3 + 1] = col.g; starColors[i * 3 + 2] = col.b;
                const sizeRand = Math.random();
                if (sizeRand < 0.85) starSizes[i] = (0.3 + Math.random() * 2.6) * sizeMultiplier;  
                else if (sizeRand < 0.97) starSizes[i] = (0.8 + Math.random() * 4.2) * sizeMultiplier;  
                else starSizes[i] = (1.8 + Math.random() * 8.0) * sizeMultiplier;  
                starPhases[i] = Math.random() * Math.PI * 2;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
            starGeometry.setAttribute('phase', new THREE.BufferAttribute(starPhases, 1));
            
            const starMaterial = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: renderer.getPixelRatio() } },
                vertexShader: `
attribute float size; attribute float phase; varying vec3 vColor; varying float vBrightness; uniform float uTime; uniform float uPixelRatio;
void main() {
vColor = color; float twinkleSpeed = 0.5 + phase * 0.8; float twinkle = 0.6 + 0.4 * sin(uTime * twinkleSpeed + phase * 6.2831); vBrightness = twinkle;
vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * uPixelRatio * twinkle * (200.0 / -mvPosition.z); gl_PointSize = max(gl_PointSize, 0.5); gl_Position = projectionMatrix * mvPosition; }`,
                fragmentShader: `
varying vec3 vColor; varying float vBrightness;
void main() {
vec2 center = gl_PointCoord - vec2(0.5); float dist = length(center); if (dist > 0.5) discard;
float core = smoothstep(0.5, 0.0, dist); float glow = smoothstep(0.5, 0.1, dist) * 0.6; float alpha = (core + glow) * vBrightness;
vec2 absCenter = abs(center); float cross = smoothstep(0.02, 0.0, min(absCenter.x, absCenter.y)) * 0.3; alpha += cross * vBrightness;
gl_FragColor = vec4(vColor * (0.8 + vBrightness * 0.5), alpha); }`,
                transparent: true, vertexColors: true, depthWrite: false, blending: THREE.AdditiveBlending,
            });
            const starField = new THREE.Points(starGeometry, starMaterial);
            starField.renderOrder = -1; 
            scene.add(starField);
            
            const dustCount = 500;
            const dustGeometry = new THREE.BufferGeometry();
            const dustPositions = new Float32Array(dustCount * 3);
            const dustSizes = new Float32Array(dustCount);
            const dustPhases = new Float32Array(dustCount);
            const dustVelocities = [];
            for (let i = 0; i < dustCount; i++) {
                dustPositions[i * 3] = (Math.random() - 0.5) * 250; dustPositions[i * 3 + 1] = (Math.random() - 0.5) * 250; dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 250;
                dustSizes[i] = 0.2 + Math.random() * 0.4; dustPhases[i] = Math.random() * Math.PI * 2;
                dustVelocities.push({ x: (Math.random() - 0.5) * 0.02, y: (Math.random() - 0.5) * 0.015, z: (Math.random() - 0.5) * 0.02 });
            }
            dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
            dustGeometry.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));
            dustGeometry.setAttribute('phase', new THREE.BufferAttribute(dustPhases, 1));
            const dustMaterial = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: renderer.getPixelRatio() } },

        else if (/iPhone/.test(_ua)) deviceLabel = 'iPhone';
        else if (/Android/.test(_ua)) deviceLabel = _ua.match(/;\s*([^;)]+)/)?.[1]?.trim() || 'Android';

            const deltaTime = currentTime - lastFrameTime;

            lastFrameTime = currentTime;
            frameCount++;

            updatePhysics(time);
            starSystem.update(time);
            treeLightsSystem.update(time);
            composer.render();
            if (currentTime - lastFPSUpdateTime >= 500) {

            }

        const hudToggle = document.getElementById('hud-toggle'); const hudText = document.getElementById('hud-text'); let hudExpanded = false;

            else { hudText.classList.remove('expanded'); hudToggle.classList.remove('slide-right'); hudToggle.textContent = '☰'; }
        }
        hudToggle.addEventListener('click', toggleHUD); hudText.addEventListener('click', toggleHUD);

        const rightHudToggle = document.getElementById('right-hud-toggle'); const rightHudPanel = document.getElementById('right-hud-panel'); let rightHudExpanded = false;
        function toggleRightHUD() {
            rightHudExpanded = !rightHudExpanded;
            if (rightHudExpanded) { rightHudPanel.classList.add('expanded'); rightHudToggle.classList.add('slide-left'); rightHudToggle.textContent = '✕'; } 
            else { rightHudPanel.classList.remove('expanded'); rightHudToggle.classList.remove('slide-left'); rightHudToggle.textContent = '☰'; }
        }
        rightHudToggle.addEventListener('click', toggleRightHUD);
        rightHudPanel.addEventListener('click', (e) => { if (e.target.closest('#upload-btn') || e.target.closest('#gesture-toggle-btn')) return; toggleRightHUD(); });

        const gestureToggleBtn = document.getElementById('gesture-toggle-btn');
        gestureToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); gestureEnabled = !gestureEnabled;
            if (gestureEnabled) {
                gestureToggleBtn.textContent = '🖐 手势识别: 开启'; gestureToggleBtn.classList.remove('disabled');
                if (cameraUtils) cameraUtils.start(); debugCanvas.style.display = 'block';
            } else {
                gestureToggleBtn.textContent = '🚫 手势识别: 关闭'; gestureToggleBtn.classList.add('disabled');
                if (cameraUtils) cameraUtils.stop(); debugCanvas.style.display = 'none';
                STATE.handDetected = false; STATE.targetCameraRadius = 200;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            if (bloomPass) bloomPass.resolution.set(Math.floor(window.innerWidth / 2), Math.floor(window.innerHeight / 2));
        });
    </script>
</body>

</html>
